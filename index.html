<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>하이탑부동산 매물 목록</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="assets/js/storage.js"></script>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header class="header">
    <div class="logo-icon"></div>
    <div class="logo-text">
      <div class="logo-main">HITOP 부동산</div>
      <div class="logo-sub">파주/운정을 가장 잘 아는 상가·토지·오피스텔 전문</div>
    </div>
  </header>
  <div class="header-line"></div>

  <!-- 매물 등록 -->
  <div class="quick-card">
    <div class="quick-title">+ 매물 등록</div>
    <div class="quick-sub">유형을 선택하면 해당 입력항목이 자동으로 나타납니다</div>

    <div class="form-grid-2" style="margin-bottom:10px;">
      <div class="field">
        <label>매물유형</label>
        <select id="q_type">
          <option value="">— 선택하세요 —</option>
          <option value="shop">상가/사무실</option>
          <option value="officetel">오피스텔</option>
          <option value="land_single">토지 (단독부지)</option>
          <option value="land_dev">토지 (시행부지)</option>
          <option value="land_other">토지 (그 외)</option>
          <option value="factory">공장/창고</option>
          <option value="bizcenter">지식산업센터</option>
        </select>
      </div>
      <div class="field">
        <label>거래상태</label>
        <select id="q_status">
          <option value="광고중">광고중</option>
          <option value="거래완료">거래완료</option>
        </select>
      </div>
    </div>

    <div class="form-grid-1" style="margin-bottom:10px;">
      <div class="field">
        <label>매물 제목</label>
        <input id="q_title" type="text" placeholder="예) 운정역 1층 상가 임대 (전용 24평)" />
      </div>
      <div class="field">
        <label>주소</label>
        <input id="q_address" type="text" placeholder="파주시 ○○동 ○○로 00" />
      </div>
      <div class="field">
        <label>집주인 연락처</label>
        <input id="q_contact" type="tel" placeholder="010-0000-0000" />
      </div>
    </div>

    <div id="q_dynamicSection" style="display:none;margin-bottom:10px;">
      <div id="q_dynamicFields" class="form-grid-2"></div>
    </div>

    <div class="field" style="margin-bottom:12px;">
      <label>메모 / 상세 설명</label>
      <textarea id="q_memo" placeholder="상권·입지·특징·집주인 성격 등 자유롭게 기록" style="min-height:60px;"></textarea>
    </div>

    <div style="text-align:right;">
      <button class="btn btn-primary" id="quickSaveBtn">저장하기</button>
    </div>
  </div>

  <!-- 검색 + 정렬 -->
  <section class="card">
    <div class="card-title"><span>🔍 검색 / 정렬</span></div>
    <div class="form-grid-2" style="margin-bottom:0;">
      <div class="field">
        <input id="searchInput" type="text" placeholder="주소, 메모, 가격 등으로 검색..." />
      </div>
      <div class="field">
        <select id="sortSelect">
          <option value="newest">최신순</option>
          <option value="oldest">오래된순</option>
        </select>
      </div>
    </div>
  </section>

  <!-- 필터 -->
  <section class="card">
    <div class="card-title">
      <span>유형별 필터</span>
      <span style="font-size:0.75rem;color:var(--text-muted)">거래완료 매물 자동 숨김</span>
    </div>
    <div class="filter-row" id="filterRow">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="shop">상가/사무실</button>
      <button class="filter-btn" data-filter="officetel">오피스텔</button>
      <button class="filter-btn" data-filter="land">토지</button>
      <button class="filter-btn" data-filter="factory">공장/창고</button>
      <button class="filter-btn" data-filter="bizcenter">지식산업센터</button>
      <button class="filter-btn" data-filter="done">거래완료</button>
    </div>
  </section>

  <!-- 목록 -->
  <section class="card">
    <div class="card-title">
      <span>등록된 매물 <span id="countBadge" style="font-size:0.78rem;color:var(--text-muted);"></span></span>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" id="printBtn">🖨 인쇄</button>
        <button class="btn btn-ghost" onclick="location.href='register.html'">+ 상세 등록</button>
      </div>
    </div>
    <div id="listingContainer" class="listing-list"></div>
    <div id="emptyMessage" style="display:none;font-size:0.82rem;color:var(--text-muted);margin-top:8px;text-align:center;padding:20px 0;">
      등록된 매물이 없습니다.
    </div>
  </section>

</div>

<div id="toast"></div>

<script>
  const listingContainer = document.getElementById("listingContainer");
  const emptyMessage = document.getElementById("emptyMessage");
  const filterRow = document.getElementById("filterRow");
  const countBadge = document.getElementById("countBadge");

  let allListings = [];
  let currentFilter = "all";
  let searchKeyword = "";
  let currentSort = "newest";

  function getTypeLabel(type) {
    const map = { shop:"상가/사무실", officetel:"오피스텔", factory:"공장/창고", bizcenter:"지식산업센터" };
    if (map[type]) return map[type];
    if (type && type.startsWith("land")) return "토지";
    return "기타";
  }

  function mapTypeToFilter(type) {
    if (type === "shop") return "shop";
    if (type === "officetel") return "officetel";
    if (type && type.startsWith("land")) return "land";
    if (type === "factory") return "factory";
    if (type === "bizcenter") return "bizcenter";
    return "other";
  }

  function formatPrice(item) {
    if (item.type === "shop") {
      const d = item.shop_deposit ? Number(item.shop_deposit).toLocaleString("ko-KR")+"만원" : "";
      const r = item.shop_monthlyRent ? Number(item.shop_monthlyRent).toLocaleString("ko-KR")+"만원" : "";
      if (d && r) return `보증금 ${d} / 월세 ${r}`;
      if (item.quick_price) return item.quick_price;
      return "";
    }
    if (item.type === "officetel") return `${item.officetel_dealType||""} ${item.officetel_price ? Number(item.officetel_price).toLocaleString("ko-KR")+"만원" : ""}`;
    if (item.type && item.type.startsWith("land")) return item.land_price ? `매매 ${Number(item.land_price).toLocaleString("ko-KR")}만원` : (item.quick_price||"");
    if (item.type === "factory") return item.factory_price ? `${item.factory_dealType||""} ${Number(item.factory_price).toLocaleString("ko-KR")}만원` : (item.quick_price||"");
    if (item.type === "bizcenter") return item.biz_price ? `${item.biz_dealType||""} ${Number(item.biz_price).toLocaleString("ko-KR")}만원` : (item.quick_price||"");
    return item.quick_price || "";
  }

  function renderList() {
    listingContainer.innerHTML = "";

    let filtered = allListings.filter(item => {
      if (currentFilter === "done") return item.status === "거래완료";
      if (item.status === "거래완료") return false;
      if (currentFilter === "all") return true;
      return mapTypeToFilter(item.type) === currentFilter;
    });

    // 검색 필터
    if (searchKeyword) {
      const kw = searchKeyword.toLowerCase();
      filtered = filtered.filter(item => {
        const fields = [item.title, item.address, item.quick_price, item.quick_memo, item.quick_contact, item.description].join(" ").toLowerCase();
        return fields.includes(kw);
      });
    }

    // 정렬
    filtered.sort((a, b) => {
      const da = new Date(a.created_at || 0);
      const db = new Date(b.created_at || 0);
      return currentSort === "newest" ? db - da : da - db;
    });

    countBadge.textContent = filtered.length ? `(${filtered.length}건)` : "";

    if (!filtered.length) {
      emptyMessage.style.display = "block";
      return;
    }
    emptyMessage.style.display = "none";

    filtered.forEach(item => {
      const card = document.createElement("div");
      card.className = "listing-card";
      card.onclick = () => location.href = `detail.html?id=${item.id}`;

      const isQuick = item.quick_price && !item.shop_deposit && !item.land_price && !item.officetel_price;

      card.innerHTML = `
        <div class="listing-title">${item.title || "(빠른등록 — 제목 미입력)"}</div>
        <div class="listing-meta">${getTypeLabel(item.type)} · ${item.address || ""}</div>
        <div class="listing-price">${formatPrice(item)}</div>
        <div class="badge-row">
          <span class="badge">${getTypeLabel(item.type)}</span>
          ${isQuick ? '<span class="badge badge-blue">⚡빠른등록</span>' : ""}
          ${item.status === "거래완료" ? '<span class="badge badge-red">거래완료</span>' : ""}
          ${item.quick_contact ? `<span class="badge badge-green">📞 ${item.quick_contact}</span>` : ""}
        </div>
        ${item.quick_memo ? `<div style="margin-top:6px;font-size:0.76rem;color:var(--text-muted);">📝 ${item.quick_memo}</div>` : ""}
      `;

      listingContainer.appendChild(card);
    });
  }

  function showToast(msg, duration = 2000) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), duration);
  }

  // 등록 폼 — 유형별 동적 필드
  const qTypeLabels = {
    shop:"상가/사무실", officetel:"오피스텔",
    land_single:"토지(단독)", land_dev:"토지(시행)", land_other:"토지",
    factory:"공장/창고", bizcenter:"지식산업센터"
  };

  function qf(label, id, placeholder="", type="text") {
    return `<div class="field"><label>${label}</label><input id="q_${id}" type="${type}" placeholder="${placeholder}" /></div>`;
  }
  function qfsel(label, id, options) {
    const opts = options.map(o => `<option value="${o}">${o}</option>`).join("");
    return `<div class="field"><label>${label}</label><select id="q_${id}">${opts}</select></div>`;
  }

  function renderQDynamicFields(type) {
    const section = document.getElementById("q_dynamicSection");
    const fields  = document.getElementById("q_dynamicFields");
    let html = "";
    if (type === "shop") {
      html += qfsel("거래유형","shop_dealType",["임대","매매","매매+임대"]);
      html += qf("층수","shop_floor","예) 1층");
      html += qf("전용면적(㎡)","shop_area_sqm","예) 79","number");
      html += qf("전용면적(평)","shop_area_py","자동계산");
      html += qf("보증금(만원)","shop_deposit","예) 6000","number");
      html += qf("월세(만원)","shop_monthlyRent","예) 500","number");
      html += qf("관리비(만원)","shop_maintenance","예) 20","number");
      html += qf("권리금","shop_premium","예) 없음");
      html += qfsel("임대상태","shop_status",["임차인 영업중","공실"]);
      html += qf("예상 수익률(%)","shop_yield","","number");
      html += qf("주차","shop_parking","예) 10대");
      html += qf("입주가능일","shop_available","예) 즉시");
    }
    if (type === "officetel") {
      html += qfsel("단지명","officetel_complex",["힐스테이트더운정","디에이블","엠버418","클래스원","기타"]);
      html += qf("타입","officetel_type","예) 29");
      html += qfsel("구조","officetel_structure",["원룸","투룸","쓰리룸"]);
      html += qf("층수","officetel_floor","예) 10층");
      html += qfsel("거래유형","officetel_dealType",["전세","월세","매매"]);
      html += qf("금액(만원)","officetel_price","","number");
      html += qf("전용면적(㎡)","officetel_area_sqm","","number");
      html += qf("전용면적(평)","officetel_area_py","자동계산");
      html += qf("향","officetel_direction","예) 남향");
      html += qfsel("일반사업자","officetel_biz",["가능","불가"]);
      html += qfsel("전입","officetel_resident",["가능","불가"]);
      html += qf("주차","officetel_parking","예) 1대");
      html += qf("입주가능일","officetel_available","예) 즉시");
    }
    if (type && type.startsWith("land")) {
      html += qf("토지종류","land_kind", type==="land_single"?"단독부지":type==="land_dev"?"시행부지":"기타");
      html += qf("면적(㎡)","land_area_sqm","","number");
      html += qf("면적(평)","land_area_py","자동계산");
      html += qf("지목","land_jimok","예) 대");
      html += qf("용도지역","land_zone","예) 계획관리");
      html += qf("건폐율(%)","land_coverage","","number");
      html += qf("용적률(%)","land_far","","number");
      html += qf("도로접함","land_road","예) 6m 도로");
      html += qf("형상","land_shape","예) 사각형");
      html += qf("매매가(만원)","land_price","","number");
    }
    if (type === "factory") {
      html += qfsel("구분","factory_kind",["공장","창고"]);
      html += qf("대지면적(㎡)","factory_siteArea_sqm","","number");
      html += qf("대지면적(평)","factory_siteArea_py","자동계산");
      html += qf("건물면적(㎡)","factory_buildArea_sqm","","number");
      html += qf("건물면적(평)","factory_buildArea_py","자동계산");
      html += qf("층고(m)","factory_height","","number");
      html += qf("전력(kW)","factory_power","","number");
      html += qfsel("대형차 진입","factory_truck",["가능","불가"]);
      html += qfsel("거래유형","factory_dealType",["임대","매매"]);
      html += qf("금액(만원)","factory_price","","number");
      html += qf("주차","factory_parking","예) 10대");
      html += qf("입주가능일","factory_available","예) 즉시");
    }
    if (type === "bizcenter") {
      html += qf("센터명","biz_name","예) ○○지식산업센터");
      html += qfsel("구분","biz_kind",["업무형","제조형","혼합"]);
      html += qf("층수","biz_floor","");
      html += qfsel("거래유형","biz_dealType",["분양","임대","매매"]);
      html += qf("전용면적(㎡)","biz_privArea_sqm","","number");
      html += qf("전용면적(평)","biz_privArea_py","자동계산");
      html += qf("금액(만원)","biz_price","","number");
      html += qf("주차","biz_parking","");
      html += qf("입주가능일","biz_available","");
    }
    fields.innerHTML = html;
    section.style.display = html ? "block" : "none";
    // 평 자동계산
    fields.querySelectorAll("input[id*='sqm']").forEach(inp => {
      inp.addEventListener("input", () => {
        const sqm = parseFloat(inp.value);
        const pyEl = document.getElementById(inp.id.replace("_sqm","_py"));
        if (pyEl) pyEl.value = sqm > 0 ? (sqm / 3.3058).toFixed(1) : "";
      });
    });
  }

  document.getElementById("q_type").addEventListener("change", function() {
    if (this.value) renderQDynamicFields(this.value);
    else { document.getElementById("q_dynamicSection").style.display = "none"; document.getElementById("q_dynamicFields").innerHTML = ""; }
  });

  // 저장
  document.getElementById("quickSaveBtn").addEventListener("click", async () => {
    const type    = document.getElementById("q_type").value;
    const address = document.getElementById("q_address").value.trim();
    const contact = document.getElementById("q_contact").value.trim();
    const memo    = document.getElementById("q_memo").value.trim();
    const title   = document.getElementById("q_title").value.trim();
    const status  = document.getElementById("q_status").value;

    if (!type) { showToast("매물유형을 선택하세요"); return; }
    if (!address && !title) { showToast("주소 또는 제목 중 하나는 입력해주세요"); return; }

    const btn = document.getElementById("quickSaveBtn");
    btn.disabled = true; btn.textContent = "저장 중...";

    try {
      const item = {
        id: "HITOP-" + Date.now(),
        type, address, status,
        title: title || `${getTypeLabel(type)} · ${address||"주소미입력"}`,
        description: memo,
        quick_contact: contact,
        quick_memo: memo,
        owner_contact: contact
      };
      // 동적 필드 수집
      document.getElementById("q_dynamicFields").querySelectorAll("input, select").forEach(el => {
        if (el.value) item[el.id.replace("q_", "")] = el.value;
      });

      await addListing(item);

      // 폼 초기화
      ["q_title","q_address","q_contact","q_memo"].forEach(id => document.getElementById(id).value = "");
      document.getElementById("q_type").value = "";
      document.getElementById("q_status").value = "광고중";
      document.getElementById("q_dynamicSection").style.display = "none";
      document.getElementById("q_dynamicFields").innerHTML = "";

      showToast("✅ 저장완료!");
      await loadListings();
    } catch(e) {
      showToast("❌ 저장 실패: " + e.message);
    } finally {
      btn.disabled = false; btn.textContent = "저장하기";
    }
  });

  // 인쇄
  document.getElementById("printBtn").addEventListener("click", () => {
    const list = allListings.filter(item => {
      if (currentFilter === "done") return item.status === "거래완료";
      if (item.status === "거래완료") return false;
      if (currentFilter === "all") return true;
      return mapTypeToFilter(item.type) === currentFilter;
    }).filter(item => {
      if (!searchKeyword) return true;
      const kw = searchKeyword.toLowerCase();
      return [item.title, item.address, item.quick_price, item.quick_memo, item.quick_contact, item.description].join(" ").toLowerCase().includes(kw);
    });

    const rows = list.map((item, i) => `
      <tr>
        <td>${i + 1}</td>
        <td>${getTypeLabel(item.type)}</td>
        <td>${item.address || ""}</td>
        <td>${formatPrice(item)}</td>
        <td>${item.quick_contact || item.owner_contact || ""}</td>
        <td>${item.quick_memo || item.description || ""}</td>
      </tr>
    `).join("");

    const html = `
      <!DOCTYPE html><html lang="ko"><head>
      <meta charset="UTF-8">
      <title>하이탑부동산 매물목록</title>
      <style>
        body { font-family: "Noto Sans KR", sans-serif; font-size: 11px; margin: 20px; }
        h2 { font-size: 15px; margin-bottom: 4px; }
        p  { font-size: 10px; color: #666; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a2a4a; color: #d4af37; padding: 7px 8px; text-align: left; font-size: 11px; }
        td { padding: 6px 8px; border-bottom: 1px solid #ddd; vertical-align: top; }
        tr:nth-child(even) td { background: #f9f9f9; }
        .no { width: 30px; text-align: center; }
        .type { width: 80px; }
        .price { width: 140px; }
        .contact { width: 110px; }
      </style>
      </head><body>
      <h2>🏢 하이탑부동산 매물목록</h2>
      <p>출력일: ${new Date().toLocaleDateString("ko-KR")} &nbsp;|&nbsp; 총 ${list.length}건</p>
      <table>
        <thead><tr>
          <th class="no">No</th>
          <th class="type">유형</th>
          <th>주소</th>
          <th class="price">가격</th>
          <th class="contact">집주인 연락처</th>
          <th>메모/특이사항</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      </body></html>
    `;

    const w = window.open("", "_blank");
    w.document.write(html);
    w.document.close();
    w.focus();
    setTimeout(() => w.print(), 500);
  });

  // 검색
  document.getElementById("searchInput").addEventListener("input", (e) => {
    searchKeyword = e.target.value.trim();
    renderList();
  });

  // 정렬
  document.getElementById("sortSelect").addEventListener("change", (e) => {
    currentSort = e.target.value;
    renderList();
  });

  // 필터
  filterRow.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      filterRow.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.filter;
      renderList();
    });
  });

  async function loadListings() {
    listingContainer.innerHTML = `<div class="loading"><span class="spinner"></span>불러오는 중...</div>`;
    try {
      allListings = await getListings();
      renderList();
    } catch(e) {
      listingContainer.innerHTML = `<div class="loading">❌ 불러오기 실패: ${e.message}</div>`;
    }
  }

  loadListings();
</script>
</body>
</html>
