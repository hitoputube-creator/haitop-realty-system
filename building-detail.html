<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>하이탑부동산 | 건물 상세</title>
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="assets/css/app.css" />
  <style>
    /* ── 섹션 타이틀 ── */
    .sec-title {
      font-size: 1rem; font-weight: 800; color: var(--gold);
      margin: 0 0 16px; display: flex; align-items: center; gap: 8px;
    }
    .sec-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(212,175,55,0.3), transparent);
    }

    /* ── 건물 기본정보 요약 그리드 ── */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px; margin-bottom: 16px;
    }
    .info-cell {
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(212,175,55,0.15);
      border-radius: 10px; padding: 10px 14px;
    }
    .info-cell-label {
      font-size: 0.7rem; font-weight: 700;
      color: rgba(180,200,230,0.55); letter-spacing: 0.5px;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .info-cell-value {
      font-size: 0.9rem; color: var(--text); font-weight: 600;
      line-height: 1.4;
    }
    .info-cell-value.empty { color: rgba(255,255,255,0.22); font-weight: 400; }

    /* ── 업로드 폼 ── */
    .upload-row {
      display: grid; gap: 8px; align-items: center; margin-bottom: 10px;
    }
    .upload-row.floor-row  { grid-template-columns: 110px 1fr auto; }
    .upload-row.file-row   { grid-template-columns: 1fr 1fr auto; }
    .upload-row.link-row   { grid-template-columns: 1fr 1fr auto; }

    /* ── 평면도 카드 그리드 ── */
    .floor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px; margin-top: 14px;
    }
    .floor-card {
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; overflow: hidden;
      display: flex; flex-direction: column;
      transition: border-color 0.18s;
    }
    .floor-card:hover { border-color: rgba(212,175,55,0.35); }

    .floor-thumb {
      width: 100%; aspect-ratio: 4/3;
      object-fit: cover; cursor: pointer;
      background: rgba(0,0,0,0.4);
      display: block;
      transition: opacity 0.15s;
    }
    .floor-thumb:hover { opacity: 0.85; }

    .floor-pdf {
      width: 100%; aspect-ratio: 4/3;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; background: rgba(212,175,55,0.06);
      cursor: pointer;
    }
    .floor-pdf-icon { font-size: 2.2rem; }
    .floor-pdf-label {
      font-size: 0.72rem; color: var(--muted);
      text-align: center; padding: 0 8px;
      word-break: break-all; line-height: 1.4;
    }

    .floor-card-foot {
      padding: 8px 10px;
      display: flex; align-items: center; justify-content: space-between; gap: 6px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .floor-badge {
      font-size: 0.78rem; font-weight: 700; color: var(--gold);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .btn-icon {
      border: none; background: transparent;
      color: rgba(255,100,100,0.7); cursor: pointer;
      font-size: 0.95rem; padding: 2px 4px;
      border-radius: 6px; transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-icon:hover { background: rgba(255,79,106,0.18); color: var(--danger); }

    /* ── 기타 자료 그리드 (평면도와 동일 레이아웃) ── */
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px; margin-top: 14px;
    }

    /* ── 업로드 진행 ── */
    .upload-progress {
      display: none; align-items: center; gap: 8px;
      font-size: 0.8rem; color: var(--gold); padding: 4px 0;
    }
    .upload-progress.active { display: flex; }
    .spinner-sm {
      width: 14px; height: 14px;
      border: 2px solid rgba(212,175,55,0.3);
      border-top-color: var(--gold);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align: center; padding: 28px 20px;
      color: var(--muted); font-size: 0.85rem;
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 12px;
    }

    /* ── 라이트박스 ── */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.92);
      align-items: center; justify-content: center;
      padding: 20px;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 94vw; max-height: 90vh;
      object-fit: contain; border-radius: 8px;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }
    #lightbox-close {
      position: fixed; top: 18px; right: 22px;
      font-size: 1.8rem; color: rgba(255,255,255,0.75);
      cursor: pointer; line-height: 1;
      transition: color 0.15s;
    }
    #lightbox-close:hover { color: var(--gold); }
    #lightbox-caption {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      font-size: 0.85rem; color: rgba(255,255,255,0.55);
      background: rgba(0,0,0,0.6); border-radius: 8px; padding: 6px 16px;
    }

    /* ══════════════════════════════════
       호실 현황 섹션
    ══════════════════════════════════ */
    /* 요약 카드 */
    .summary-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px;
    }
    @media (max-width: 600px) { .summary-grid { grid-template-columns: 1fr 1fr; } }
    .sum-card {
      border-radius: 14px; padding: 14px 16px; text-align: center;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .sum-card.occupied { background: rgba(34,197,94,0.10);  border-color: rgba(34,197,94,0.25); }
    .sum-card.vacant   { background: rgba(239,68,68,0.10);  border-color: rgba(239,68,68,0.25); }
    .sum-card.forsale  { background: rgba(234,179,8,0.10);  border-color: rgba(234,179,8,0.25); }
    .sum-card.revenue  { background: rgba(96,165,250,0.10); border-color: rgba(96,165,250,0.25); }
    .sum-num   { font-size: 1.65rem; font-weight: 900; line-height: 1; }
    .sum-label { font-size: 0.76rem; color: var(--muted); margin-top: 5px; }
    .sum-card.occupied .sum-num { color: #4ade80; }
    .sum-card.vacant   .sum-num { color: #f87171; }
    .sum-card.forsale  .sum-num { color: #facc15; }
    .sum-card.revenue  .sum-num { color: #93c5fd; }

    /* 층 필터 탭 */
    .floor-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .ftab {
      border: 1px solid var(--border); background: rgba(5,10,30,0.65);
      padding: 6px 14px; border-radius: 999px; cursor: pointer;
      font-size: 0.82rem; color: var(--muted); font-weight: 700; transition: 0.12s;
    }
    .ftab.active {
      border-color: rgba(212,175,55,0.45); background: rgba(212,175,55,0.16);
      color: rgba(255,255,255,0.92);
    }

    /* 호실 테이블 */
    .units-wrap { overflow-x: auto; }
    .units-tbl { width: 100%; border-collapse: collapse; font-size: 0.85rem; white-space: nowrap; }
    .units-tbl th {
      text-align: left; padding: 9px 12px; font-size: 0.75rem; color: var(--muted);
      font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.15);
    }
    .units-tbl td {
      padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.88); vertical-align: middle;
    }
    .units-tbl tr:last-child td { border-bottom: none; }
    .units-tbl tr:hover td { background: rgba(212,175,55,0.04); }

    /* 상태 배지 */
    .sbadge {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      font-size: 0.74rem; font-weight: 700;
    }
    .sbadge.임차중  { background: rgba(34,197,94,0.18);  color: #4ade80;  border: 1px solid rgba(34,197,94,0.30); }
    .sbadge.공실   { background: rgba(239,68,68,0.18);  color: #f87171;  border: 1px solid rgba(239,68,68,0.30); }
    .sbadge.매매가능 { background: rgba(234,179,8,0.18);  color: #facc15;  border: 1px solid rgba(234,179,8,0.30); }

    /* 빈 상태 */
    .units-empty {
      text-align: center; color: var(--muted); padding: 38px 20px; font-size: 0.88rem;
    }

    /* 호실 모달 */
    .unit-modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 9100;
      background: rgba(0,0,0,0.75);
      align-items: flex-start; justify-content: center;
      padding: 24px 16px; overflow-y: auto;
    }
    .unit-modal-overlay.open { display: flex; }
    .unit-modal-box {
      background: linear-gradient(145deg, #0E1C34 0%, #132040 100%);
      border: 1px solid rgba(212,175,55,0.30); border-radius: 20px;
      padding: 24px; width: 100%; max-width: 620px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7); position: relative;
    }
    .unit-modal-title { font-size: 1.1rem; font-weight: 900; margin-bottom: 16px; color: rgba(255,255,255,0.95); }
    .unit-modal-close {
      position: absolute; top: 18px; right: 18px;
      background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer;
    }
    .unit-modal-close:hover { color: #fff; }
    /* 모달 섹션 구분 */
    .um-section { margin-bottom: 14px; border-radius: 10px; overflow: hidden; }
    .um-section-title {
      font-size: 0.78rem; font-weight: 800; letter-spacing: 0.5px;
      color: #fff; padding: 7px 14px;
    }
    /* 분양 당시 — 파란 계열 */
    .um-section.sale .um-section-title { background: #1a3a6e; }
    .um-section.sale { background: rgba(26,58,110,0.18); }
    .um-section.sale .umgrid { padding: 10px 12px 12px; }
    /* 현재 현황 — 골드 계열 */
    .um-section.current .um-section-title { background: #8B6914; }
    .um-section.current { background: #0d1f3c; }
    .um-section.current .umgrid { padding: 10px 12px 12px; }
    .um-section.current .umfield input,
    .um-section.current .umfield select,
    .um-section.current .umfield textarea {
      border-color: rgba(201,168,76,0.45);
    }
    .um-section.current .umfield input:focus,
    .um-section.current .umfield select:focus,
    .um-section.current .umfield textarea:focus {
      border-color: #C9A84C;
    }
    .umgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 480px) { .umgrid { grid-template-columns: 1fr; } }
    .umgrid .full { grid-column: 1 / -1; }
    /* 취소 버튼 */
    .btn-unit-ghost {
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.14); border-radius: 10px;
      padding: 9px 18px; font-size: 0.88rem; cursor: pointer; font-family: inherit;
    }
    .btn-unit-ghost:hover { background: rgba(255,255,255,0.10); }
    /* 실시간 한글 금액 힌트 */
    .amt-hint {
      display: block; min-height: 16px;
      font-size: 0.74rem; font-weight: 700;
      color: #C9A84C; margin-top: 3px; letter-spacing: 0.2px;
    }
    .umfield label { display: block; font-size: 0.76rem; color: var(--muted); margin-bottom: 5px; font-weight: 700; }
    .umfield input, .umfield select, .umfield textarea {
      width: 100%; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 9px 12px; font-size: 0.88rem;
      color: rgba(255,255,255,0.92); font-family: inherit; outline: none; transition: border-color 0.15s;
    }
    .umfield input:focus, .umfield select:focus, .umfield textarea:focus {
      border-color: rgba(212,175,55,0.55);
    }
    .umfield textarea { resize: vertical; min-height: 66px; }
    .umfield select option { background: #0D1728; }
    .unit-modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }

    /* 소형 버튼 */
    .btn-unit-edit {
      background: rgba(212,175,55,0.10); color: #D4AF37;
      border: 1px solid rgba(212,175,55,0.25); border-radius: 8px;
      padding: 5px 11px; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: 0.12s;
    }
    .btn-unit-edit:hover { background: rgba(212,175,55,0.20); }
    .btn-unit-del {
      background: rgba(239,68,68,0.10); color: #f87171;
      border: 1px solid rgba(239,68,68,0.22); border-radius: 8px;
      padding: 5px 11px; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: 0.12s;
    }
    .btn-unit-del:hover { background: rgba(239,68,68,0.20); }
    .btn-unit-add {
      background: linear-gradient(135deg, #D4AF37 0%, #B8962A 100%); color: #000;
      border: none; border-radius: 10px; padding: 9px 20px;
      font-weight: 800; font-size: 0.9rem; cursor: pointer; transition: 0.15s;
    }
    .btn-unit-add:hover { opacity: 0.88; }
    .unit-sec-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; gap: 10px;
    }
    .unit-sec-head h3 { margin: 0; font-size: 1rem; font-weight: 800; color: rgba(255,255,255,0.92); }
  </style>
</head>
<body>
<div class="page">

  <!-- TOPBAR -->
  <header class="topbar" style="margin-bottom:20px;">
    <div class="brand">
      <div class="logo"></div>
      <div class="brand-text">
        <h1 id="buildingName">건물 상세</h1>
        <p>층별 평면도 · 기타 자료 관리</p>
      </div>
    </div>
    <div class="actions">
      <button class="btn" onclick="goBack()">← 뒤로가기</button>
    </div>
  </header>

  <!-- ===== 건물 기본정보 요약 ===== -->
  <div class="card" style="margin-bottom:20px;">
    <div class="sec-title">🏢 건물 기본정보</div>
    <div class="info-grid" id="infoGrid">
      <div class="info-cell"><div class="info-cell-label">불러오는 중…</div></div>
    </div>
    <div style="display:flex;justify-content:flex-end;">
      <button class="btn" style="font-size:0.82rem;" onclick="goOverview()">📝 개요 상세보기</button>
    </div>
  </div>

  <!-- ===== 층별 평면도 ===== -->
  <div class="card" style="margin-bottom:20px;">
    <div class="sec-title">📐 층별 평면도</div>

    <div class="upload-row floor-row">
      <input id="floorNum" type="text" placeholder="층 (예: 1층)" />
      <input id="floorFile" type="file" accept="image/*,.pdf" style="font-size:0.85rem;" />
      <button class="btn primary" onclick="uploadFloor()">+ 추가</button>
    </div>
    <div class="upload-progress" id="floorProgress">
      <div class="spinner-sm"></div> 업로드 중…
    </div>

    <div class="floor-grid" id="floorGrid">
      <div class="empty-state" style="grid-column:1/-1;">등록된 평면도가 없습니다.</div>
    </div>
  </div>

  <!-- ===== 기타 자료 ===== -->
  <div class="card" style="margin-bottom:20px;">
    <div class="sec-title">📄 기타 자료</div>

    <!-- 파일 업로드 -->
    <div class="upload-row file-row">
      <input id="fileName" type="text" placeholder="자료명 (예: 분양안내서)" />
      <input id="fileUpload" type="file" accept="image/*,.pdf,.ppt,.pptx,.doc,.docx,.xls,.xlsx" style="font-size:0.85rem;" />
      <button class="btn primary" onclick="uploadFile()">+ 추가</button>
    </div>
    <div class="upload-progress" id="fileProgress">
      <div class="spinner-sm"></div> 업로드 중…
    </div>

    <div class="file-grid" id="fileList">
      <div class="empty-state" style="grid-column:1/-1;">등록된 자료가 없습니다.</div>
    </div>
  </div>

  <!-- ===== 호실 현황 ===== -->
  <div class="card">
    <div class="unit-sec-head">
      <h3>🏬 호실 현황</h3>
      <button class="btn-unit-add" id="btnAddUnit">+ 호실 추가</button>
    </div>

    <!-- 요약 카드 -->
    <div class="summary-grid">
      <div class="sum-card occupied">
        <div class="sum-num" id="sumOccupied">-</div>
        <div class="sum-label">임차중</div>
      </div>
      <div class="sum-card vacant">
        <div class="sum-num" id="sumVacant">-</div>
        <div class="sum-label">공실</div>
      </div>
      <div class="sum-card forsale">
        <div class="sum-num" id="sumForSale">-</div>
        <div class="sum-label">매매가능</div>
      </div>
      <div class="sum-card revenue">
        <div class="sum-num" id="sumRevenue">-</div>
        <div class="sum-label">월차임 합계(만)</div>
      </div>
    </div>

    <!-- 층 필터 탭 -->
    <div class="floor-tabs" id="unitFloorTabs"></div>

    <!-- 테이블 -->
    <div class="units-wrap">
      <table class="units-tbl">
        <thead>
          <tr>
            <th>호수</th>
            <th>업종</th>
            <th>소유주</th>
            <th>연락처</th>
            <th>보증금(만)</th>
            <th>월차임(만)</th>
            <th>상태</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="unitsTbody"></tbody>
      </table>
    </div>
    <div id="unitsEmpty" class="units-empty" style="display:none;">
      등록된 호실이 없습니다. [+ 호실 추가]를 눌러 시작하세요.
    </div>
  </div>

  <!-- ★ 호실 추가/수정 모달 ★ -->
  <div class="unit-modal-overlay" id="unitModal">
    <div class="unit-modal-box">
      <button class="unit-modal-close" id="umClose">✕</button>
      <div class="unit-modal-title" id="umTitle">호실 추가</div>

      <!-- 분양 당시 -->
      <div class="um-section sale">
        <div class="um-section-title">📋 분양 당시</div>
        <div class="umgrid">
          <div class="umfield"><label>호수 *</label><input id="u_호수" placeholder="예: 101, 202" /></div>
          <div class="umfield"><label>업종</label><input id="u_현업종" placeholder="예: 음식점, 학원" /></div>
          <div class="umfield"><label>전용 (평)</label><input id="u_전용_평" type="number" step="0.01" placeholder="0.00" /></div>
          <div class="umfield"><label>분양 (평)</label><input id="u_분양_평" type="number" step="0.01" placeholder="0.00" /></div>
          <div class="umfield"><label>평당가 (만원)</label><input id="u_평당가" type="number" placeholder="0" /></div>
          <div class="umfield"><label>분양금액 (만원)</label><input id="u_분양금액" type="number" placeholder="0" /><span class="amt-hint" id="h_분양금액"></span></div>
          <div class="umfield"><label>보증금 (만원)</label><input id="u_보증금" type="number" placeholder="0" /><span class="amt-hint" id="h_보증금"></span></div>
          <div class="umfield"><label>월차임 (만원)</label><input id="u_월차임" type="number" placeholder="0" /><span class="amt-hint" id="h_월차임"></span></div>
        </div>
      </div>

      <!-- 현재 현황 -->
      <div class="um-section current">
        <div class="um-section-title">📊 현재 현황</div>
        <div class="umgrid">
          <div class="umfield">
            <label>상태 *</label>
            <select id="u_공실여부">
              <option value="임차중">임차중</option>
              <option value="공실">공실</option>
              <option value="매매가능">매매가능</option>
            </select>
          </div>

function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');

  setTimeout(() => t.classList.remove('show'), dur);
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function isImage(url, fileName) {
  const u = (url || fileName || '').toLowerCase();
  return /\.(jpe?g|png|gif|webp|bmp|svg)(\?|$)/.test(u);
}

function isPdf(url, fileName) {
  const u = (url || fileName || '').toLowerCase();
  return /\.pdf(\?|$)/.test(u);
}

/* ── Cloudinary 서명 업로드 ── */
async function sha1Hex(str) {
  const buf = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function cloudinaryUpload(file, folder = 'haitop') {
  const ts      = Math.round(Date.now() / 1000);
  const paramStr = `folder=${folder}&timestamp=${ts}${CLOUDINARY_SECRET}`;
  const sig     = await sha1Hex(paramStr);

  const fd = new FormData();
  fd.append('file', file);
  fd.append('api_key', CLOUDINARY_KEY);
  fd.append('timestamp', ts);
  fd.append('folder', folder);
  fd.append('signature', sig);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/auto/upload`,
    { method: 'POST', body: fd }
  );
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.secure_url;
}

/* ── 건물 기본정보 요약 ── */
function parseMemoFields(raw) {
  const basic = raw.indexOf(MEMO_SEP) === -1 ? raw : raw.slice(0, raw.indexOf(MEMO_SEP));
  const fields = {};
  basic.split('\n').forEach(line => {
    const c = line.indexOf(':');
    if (c === -1) return;
    fields[line.slice(0,c).trim()] = line.slice(c+1).trim();
  });
  return fields;
}

function renderInfoGrid(memo) {
  const fields = parseMemoFields(memo);
  const html = OV_FIELDS.map(f => {
    const val = fields[f.key] || '';
    return `<div class="info-cell">
      <div class="info-cell-label">${esc(f.label)}</div>
      <div class="info-cell-value${val ? '' : ' empty'}">${val ? esc(val) : '—'}</div>
    </div>`;
  }).join('');
  document.getElementById('infoGrid').innerHTML = html;
}

(function () {
  "use strict";

  const $ = id => document.getElementById(id);

  let units       = [];
  let editIdx     = -1;
  let filterFloor = "전체";
  let bName       = "";

  function fmt(n) {
    const v = Number(n);
    return (v && isFinite(v)) ? v.toLocaleString("ko-KR") : "-";
  }

  // 호수 -> 층 번호 문자열: 101->1, 201->2, 1001->10, B101->B1
  function floorOf(room) {
    const s = String(room || "").trim();
    const bm = s.match(/^[Bb](\d)/);
    if (bm) return "B" + bm[1];
    const nm = s.match(/^(\d+)/);
    if (nm) {
      const n = parseInt(nm[1], 10);
      if (n >= 1000) return String(Math.floor(n / 100));
      if (n >= 100)  return String(Math.floor(n / 100));
      return String(n);
    }
    return "기타";
  }

  function floorLabel(f) {
    if (f === "전체") return "전체";
    return f + "층";
  }

  // 건물명 읽기 (DOM 갱신 대기)
  async function getBuildingName() {
    let name = ($("buildingName") || {}).textContent || "";
    if (!name || name === "건물 상세") {
      for (let i = 0; i < 6; i++) {
        await new Promise(r => setTimeout(r, 500));
        name = ($("buildingName") || {}).textContent || "";
        if (name && name !== "건물 상세") break;
      }
    }
    return name;
  }

  // 초기 로드 (init() 완료 후 호출)
  async function loadUnits() {
    bName = await getBuildingName();
    if (!bName) {
      console.warn("[호실현황] 건물명 없음 - 건너뜀");
      return;
    }
    console.log("[호실현황] 건물명:", bName);
    try {
      const rec = await getBuildingRecord(bName);
      units = Array.isArray(rec && rec.units) ? rec.units : [];
      console.log("[호실현황] 호실 수:", units.length);
    } catch(e) {
      if (typeof showToast === "function") showToast("호실 로드 실패: " + e.message);
      console.error("[호실현황] 로드 실패:", e);
      units = [];
    }
    renderAll();
  }

  // init() 완료 후 외부에서 호출
  window._loadBuildingUnits = loadUnits;

  function renderAll() {
    renderSummary();
    renderFloorTabs();
    renderTable();
  }

  function renderSummary() {
    const occ  = units.filter(u => u.공실여부 === "임차중").length;
    const vac  = units.filter(u => u.공실여부 === "공실").length;
    const sale = units.filter(u => u.공실여부 === "매매가능").length;
    const rev  = units.reduce((s, u) => s + (Number(u.월차임) || 0), 0);
    $("sumOccupied").textContent = occ;
    $("sumVacant").textContent   = vac;
    $("sumForSale").textContent  = sale;
    $("sumRevenue").textContent  = rev ? rev.toLocaleString("ko-KR") : "-";
  }

  function renderFloorTabs() {
    const seen = {};
    const floors = [];
    units.forEach(u => {
      const f = floorOf(u.호수);
      if (f && !seen[f]) { seen[f] = true; floors.push(f); }
    });
    floors.sort((a, b) => {
      if (a.startsWith("B") && !b.startsWith("B")) return -1;
      if (!a.startsWith("B") && b.startsWith("B")) return 1;
      return parseInt(a.replace("B","")) - parseInt(b.replace("B",""));
    });

    const tabs = ["전체"].concat(floors);
    $("unitFloorTabs").innerHTML = tabs.map(f =>
      `<button class="ftab${f === filterFloor ? " active" : ""}" data-floor="${f}">${floorLabel(f)}</button>`
    ).join("");

      btn.addEventListener("click", () => {
        filterFloor = btn.dataset.floor;
        renderAll();

    $("u_분양_평").value  = u.분양_평   ? parseFloat(u.분양_평).toFixed(2)  : "";
    $("u_평당가").value   = u.평당가    || "";
    $("u_분양금액").value = u.분양금액  || "";
    $("u_보증금").value   = u.보증금    || "";
    $("u_월차임").value   = u.월차임    || "";

    // 현재 현황
    $("u_공실여부").value   = u.공실여부    || "임차중";

    $("u_현월세").value     = u.현_월세     || "";
    $("u_소유주").value     = u.소유주      || "";
    $("u_연락처").value     = u.연락처      || "";
    $("u_수익률").value     = u.수익률      || "";
    $("u_추천매물").value   = u.추천매물    || "";
    $("u_비고").value       = u.비고        || "";

    refreshHints(u);
    $("unitModal").classList.add("open");
    $("u_호수").focus();
  }

  function closeModal() {
    $("unitModal").classList.remove("open");
    editIdx = -1;
  }

  async function saveUnit() {
    const 호수 = $("u_호수").value.trim();
    if (!호수) { if (typeof showToast === "function") showToast("호수를 입력하세요."); return; }

    const unit = {
      호수,
      공실여부:    $("u_공실여부").value,
      현업종:      $("u_현업종").value.trim()    || null,
      소유주:      $("u_소유주").value.trim()    || null,
      연락처:      $("u_연락처").value.trim()    || null,
      보증금:      Number($("u_보증금").value)   || null,
      월차임:      Number($("u_월차임").value)   || null,
      전용_평:     $("u_전용_평").value ? Math.round(parseFloat($("u_전용_평").value) * 100) / 100 : null,
      분양_평:     $("u_분양_평").value ? Math.round(parseFloat($("u_분양_평").value) * 100) / 100 : null,
      평당가:      Number($("u_평당가").value)   || null,
      분양금액:    Number($("u_분양금액").value) || null,
      현_매매가격: Number($("u_현매매가격").value) || null,
      현_보증금:   Number($("u_현보증금").value)   || null,
      현_월세:     Number($("u_현월세").value)     || null,
      수익률:      $("u_수익률").value.trim()    || null,
      추천매물:    $("u_추천매물").value.trim()  || null,
      비고:        $("u_비고").value.trim()      || null,
      updated_at:  new Date().toISOString()
    };

    const next = [...units];
    if (editIdx < 0) next.push(unit); else next[editIdx] = unit;

    $("umSave").disabled = true;
    $("umSave").textContent = "저장 중...";
    try {
      await saveBuildingUnits(bName, bName, next);
      units = next;
      closeModal();
      renderAll();
      if (typeof showToast === "function")
        showToast(editIdx < 0 ? "호실이 추가되었습니다." : "수정 완료되었습니다.");
    } catch(e) {
      if (typeof showToast === "function") showToast("저장 실패: " + e.message);
      console.error("[호실현황] 저장 실패:", e);
    } finally {
      $("umSave").disabled = false;
      $("umSave").textContent = "저장";
    }
  }

  async function deleteUnit() {
    if (editIdx < 0) return;
    const u = units[editIdx];
    if (!confirm(`'${u.호수}' 호실을 삭제하시겠습니까?`)) return;
    const next = units.filter((_, i) => i !== editIdx);
    $("umDelete").disabled = true;
    try {
      await saveBuildingUnits(bName, bName, next);
      units = next;
      closeModal();
      renderAll();
      if (typeof showToast === "function") showToast("삭제 완료되었습니다.");
    } catch(e) {
      if (typeof showToast === "function") showToast("삭제 실패: " + e.message);
    } finally { $("umDelete").disabled = false; }
  }

  // ── 한글 금액 변환 ──
  // 입력: 만원 단위 숫자, 출력: "X억 X,XXX만원" 또는 "X,XXX만원"
  function toKorAmt(val) {
    const n = Number(val);
    if (!n || !isFinite(n) || n <= 0) return "";
    const eok  = Math.floor(n / 10000);
    const man  = n % 10000;
    if (eok > 0 && man > 0)
      return eok.toLocaleString("ko-KR") + "억 " + man.toLocaleString("ko-KR") + "만원";
    if (eok > 0)
      return eok.toLocaleString("ko-KR") + "억원";
    return n.toLocaleString("ko-KR") + "만원";
  }

  // 한글 금액 힌트를 실시간으로 갱신하는 필드 목록
  const AMT_FIELDS = ["u_분양금액","u_보증금","u_월차임","u_현매매가격","u_현보증금","u_현월세"];

  function bindAmtHints() {
    AMT_FIELDS.forEach(function(id) {
      const input = $(id);
      const hint  = document.getElementById("h_" + id.replace("u_",""));
      if (!input || !hint) return;
      input.addEventListener("input", function() {
        hint.textContent = toKorAmt(input.value);
      });
    });
  }
  bindAmtHints();

  // 모달 열릴 때 힌트 초기값 갱신
  function refreshHints(u) {
    const map = {
      u_분양금액: u.분양금액  || "",
      u_보증금:   u.보증금    || "",
      u_월차임:   u.월차임    || "",
      u_현매매가격: u.현_매매가격 || "",
      u_현보증금: u.현_보증금  || "",
      u_현월세:   u.현_월세   || "",
    };
    Object.entries(map).forEach(function([id, val]) {
      const hint = document.getElementById("h_" + id.replace("u_",""));
      if (hint) hint.textContent = toKorAmt(val);
    });
  }

  $("btnAddUnit").addEventListener("click", () => openModal(-1));
  $("umSave").addEventListener("click", saveUnit);
  $("umDelete").addEventListener("click", deleteUnit);
  $("umCancel").addEventListener("click", closeModal);
  $("umClose").addEventListener("click", closeModal);
  $("unitModal").addEventListener("click", e => { if (e.target === $("unitModal")) closeModal(); });

  // fallback: init() 2초 후에도 미로드 시 재시도
  setTimeout(() => {
    if (units.length === 0 && bName === "") {
      console.log("[호실현황] fallback 재시도");
      loadUnits();
    }
  }, 2000);

})();
</script>
</body>
</html>
