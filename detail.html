<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>매물 상세 - 하이탑부동산</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="assets/css/style.css" />
<script src="assets/js/storage.js"></script>
</head>
<body>

<script>
  (function() {
    if (sessionStorage.getItem("hitop_auth") !== "1") {
      location.replace("index.html");
    }
  })();
</script>

<div class="page">

  <header class="header">
    <div class="logo-icon"></div>
    <div class="logo-text">
      <div class="logo-main">HITOP 부동산</div>
      <div class="logo-sub">파주/운정을 가장 잘 아는 상가·토지·오피스텔 전문</div>
    </div>
  </header>
  <div class="header-line"></div>

  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
    <button class="btn btn-ghost" onclick="location.href='index.html'">← 목록</button>
  </div>

  <div id="detailArea">
    <div class="loading"><span class="spinner"></span>불러오는 중...</div>
  </div>

</div>

<div id="toast"></div>

<!-- 전역 에러 오버레이 -->
<div id="appErrorOverlay" style="display:none;position:fixed;inset:0;z-index:99999;background:#0d0d0d;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;">
  <div style="font-size:2.5rem;margin-bottom:16px;">⚠️</div>
  <div style="font-size:1.1rem;font-weight:700;color:#e0e0e0;margin-bottom:8px;">연결 오류가 발생했습니다</div>
  <div id="appErrorMsg" style="font-size:0.85rem;color:#888;margin-bottom:24px;max-width:320px;line-height:1.6;">새로고침 해주세요.</div>
  <button onclick="location.reload()" style="background:#d4af37;color:#000;border:none;border-radius:8px;padding:12px 28px;font-size:0.95rem;font-weight:700;cursor:pointer;">🔄 새로고침</button>
  <button onclick="location.href='index.html'" style="margin-top:10px;background:none;border:1px solid #555;border-radius:8px;padding:10px 24px;font-size:0.88rem;color:#aaa;cursor:pointer;">← 목록으로</button>
</div>

<script>
  function showAppError(msg) {
    const el = document.getElementById("appErrorOverlay");
    if (!el) return;
    document.getElementById("appErrorMsg").textContent = msg || "새로고침 해주세요.";
    el.style.display = "flex";
  }
  window.onerror = function(msg, src, line, col, err) {
    showAppError((err && err.message) || msg || "알 수 없는 오류가 발생했습니다.");
  };
  window.onunhandledrejection = function(e) {
    const msg = (e.reason && e.reason.message) || String(e.reason) || "비동기 오류가 발생했습니다.";
    if (msg.includes("저장 실패") || msg.includes("수정 실패") || msg.includes("삭제 실패")) return;
    showAppError(msg);
  };
</script>

<!-- 수정 모달 -->
<div id="editModal" class="modal-overlay" style="display:none;align-items:flex-start;padding:20px 0;overflow-y:auto;">
  <div class="modal-box" style="max-width:560px;width:95%;padding:20px;">
    <div class="modal-title">✏️ 매물 수정</div>

    <div class="form-grid-2" style="margin-bottom:10px;">
      <div class="field">
        <label>1&#52264;&#44396;&#48516;</label>
        <select id="edit_category1">
          <option value="&#44277;&#51109;&#52285;&#44256;">&#44277;&#51109;&#183;&#52285;&#44256;</option>
          <option value="&#49345;&#44032;&#49324;&#47924;&#49892;">&#49345;&#44032;&#183;&#49324;&#47924;&#49892;</option>
          <option value="&#53664;&#51648;">&#53664;&#51648;</option>
          <option value="&#51452;&#44144;&#50857;">&#51452;&#44144;&#50857;</option>
          <option value="&#45800;&#46021;&#51204;&#50896;&#51452;&#53469;">&#45800;&#46021;&#183;&#51204;&#50896;&#51452;&#53469;</option>
          <option value="&#44148;&#47932;&#48716;&#46377;">&#44148;&#47932;&#183;&#48716;&#46377;</option>
        </select>
      </div>
      <div class="field">
        <label>2&#52264;&#44396;&#48516;</label>
        <select id="edit_category2"></select>
        <input id="edit_propertyType" type="hidden" value="" />

      <div class="field">

    </div>
    <div class="field" style="margin-bottom:14px;">
      <label>📁 자료 연결 (건물 자료 폴더)</label>
      <select id="edit_resource_id">
        <option value="">-- 연결 안함 --</option>
      </select>
    </div>
    <div class="field" style="margin-bottom:12px;">
      <label>&#54856;&#54168;&#51060;&#51648; &#44277;&#44060;</label>
      <label style="display:flex;align-items:center;gap:8px;color:var(--text-main);font-size:0.86rem;">
        <input id="edit_is_public" type="checkbox" style="width:auto;accent-color:var(--gold);" /> &#44277;&#44060;
      </label>
    </div>
    <div class="field" style="margin-bottom:14px;">
      <label>&#47588;&#47932; &#51060;&#48120;&#51648; (&#52572;&#45824; 5&#51109;)</label>
      <div id="edit_image_preview" class="image-preview-row"></div>
      <div id="edit_image_slots" style="margin-top:8px;display:flex;flex-direction:column;gap:6px;">

      </div>
      <div style="margin-top:6px;display:flex;align-items:center;gap:10px;">
        <button type="button" id="editAddImageSlotBtn" class="btn btn-ghost" style="font-size:0.82rem;padding:4px 10px;">+ &#52628;&#44032;</button>
        <span id="editImageCount" style="font-size:0.78rem;color:var(--text-muted);">0 / 5</span>
      </div>

    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="document.getElementById('editModal').style.display='none'">취소</button>
      <button class="btn btn-primary" id="editSaveBtn">저장</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div id="deleteModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">🗑 매물을 삭제할까요?</div>
    <div style="font-size:0.85rem;color:var(--text-muted);">삭제하면 복구가 어렵습니다.</div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="document.getElementById('deleteModal').style.display='none'">취소</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">삭제</button>
    </div>
  </div>
</div>

<script>
  let _allDriveResources = [];
  let _editImageUrls = [];
  let _editNewImageFiles = [];
  const HOMEPAGE_LISTINGS_URL = "https://hitoputube-creator.github.io/hitop-property-platform/listings.html";
function createHomepageTab() {
  const tab = window.open("about:blank", "_blank");
  if (tab) tab.opener = null;
  return tab;
}
function openHomepageListings(tab) {
  if (tab) tab.location.href = HOMEPAGE_LISTINGS_URL;
  else window.open(HOMEPAGE_LISTINGS_URL, "_blank", "noopener,noreferrer");
}
function closeHomepageTab(tab) {
  try { if (tab) tab.close(); } catch (_) {}
}

  const DETAIL_CATEGORY_OPTIONS = {"\uacf5\uc7a5\ucc3d\uace0": ["\uacf5\uc7a5", "\ucc3d\uace0", "\uacf5\uc7a5\ucc3d\uace0"], "\uc0c1\uac00\uc0ac\ubb34\uc2e4": ["\uc0c1\uac00", "\uc0ac\ubb34\uc2e4", "\uc9c0\uc2dd\uc0b0\uc5c5\uc13c\ud130"], "\ud1a0\uc9c0": ["\ud1a0\uc9c0", "\uc784\uc57c", "\ub18d\uc9c0", "\ud0dd\uc9c0"], "\uc8fc\uac70\uc6a9": ["\uc544\ud30c\ud2b8", "\uc624\ud53c\uc2a4\ud154", "\ud790\uc2a4\ud14c\uc774\ud2b8\ub354\uc6b4\uc815"], "\ub2e8\ub3c5\uc804\uc6d0\uc8fc\ud0dd": ["\ub2e8\ub3c5\uc8fc\ud0dd", "\uc804\uc6d0\uc8fc\ud0dd"], "\uac74\ubb3c\ube4c\ub529": ["\uac74\ubb3c", "\ube4c\ub529", "\uc0c1\uac00\uc8fc\ud0dd", "\ub2e4\uac00\uad6c\uc8fc\ud0dd"]};
  const DETAIL_LEGACY_TYPE_CATEGORY = {"shop": ["\uc0c1\uac00\uc0ac\ubb34\uc2e4", "\uc0c1\uac00"], "office": ["\uc0c1\uac00\uc0ac\ubb34\uc2e4", "\uc0ac\ubb34\uc2e4"], "officetel": ["\uc8fc\uac70\uc6a9", "\uc624\ud53c\uc2a4\ud154"], "hilsstate": ["\uc8fc\uac70\uc6a9", "\ud790\uc2a4\ud14c\uc774\ud2b8\ub354\uc6b4\uc815"], "factory": ["\uacf5\uc7a5\ucc3d\uace0", "\uacf5\uc7a5\ucc3d\uace0"], "bizcenter": ["\uc0c1\uac00\uc0ac\ubb34\uc2e4", "\uc9c0\uc2dd\uc0b0\uc5c5\uc13c\ud130"], "land_single": ["\ud1a0\uc9c0", "\ud1a0\uc9c0"], "land_dev": ["\ud1a0\uc9c0", "\ud1a0\uc9c0"], "land_other": ["\ud1a0\uc9c0", "\ud1a0\uc9c0"], "etc": ["\uac74\ubb3c\ube4c\ub529", "\uac74\ubb3c"]};
  const DETAIL_CATEGORY_TO_TYPE = {"\uacf5\uc7a5\ucc3d\uace0|\uacf5\uc7a5": "factory", "\uacf5\uc7a5\ucc3d\uace0|\ucc3d\uace0": "factory", "\uacf5\uc7a5\ucc3d\uace0|\uacf5\uc7a5\ucc3d\uace0": "factory", "\uc0c1\uac00\uc0ac\ubb34\uc2e4|\uc0c1\uac00": "shop", "\uc0c1\uac00\uc0ac\ubb34\uc2e4|\uc0ac\ubb34\uc2e4": "office", "\uc0c1\uac00\uc0ac\ubb34\uc2e4|\uc9c0\uc2dd\uc0b0\uc5c5\uc13c\ud130": "bizcenter", "\ud1a0\uc9c0|\ud1a0\uc9c0": "land_single", "\ud1a0\uc9c0|\uc784\uc57c": "land_other", "\ud1a0\uc9c0|\ub18d\uc9c0": "land_other", "\ud1a0\uc9c0|\ud0dd\uc9c0": "land_dev", "\uc8fc\uac70\uc6a9|\uc544\ud30c\ud2b8": "hilsstate", "\uc8fc\uac70\uc6a9|\uc624\ud53c\uc2a4\ud154": "officetel", "\uc8fc\uac70\uc6a9|\ud790\uc2a4\ud14c\uc774\ud2b8\ub354\uc6b4\uc815": "hilsstate", "\ub2e8\ub3c5\uc804\uc6d0\uc8fc\ud0dd|\ub2e8\ub3c5\uc8fc\ud0dd": "etc", "\ub2e8\ub3c5\uc804\uc6d0\uc8fc\ud0dd|\uc804\uc6d0\uc8fc\ud0dd": "etc", "\uac74\ubb3c\ube4c\ub529|\uac74\ubb3c": "etc", "\uac74\ubb3c\ube4c\ub529|\ube4c\ub529": "etc", "\uac74\ubb3c\ube4c\ub529|\uc0c1\uac00\uc8fc\ud0dd": "etc", "\uac74\ubb3c\ube4c\ub529|\ub2e4\uac00\uad6c\uc8fc\ud0dd": "etc"};

  function getCategoryFromItem(item = {}) {
    const legacy = DETAIL_LEGACY_TYPE_CATEGORY[item.type] || ["\uac74\ubb3c\ube4c\ub529", "\uac74\ubb3c"];
    let category1 = item.category1 || legacy[0];
    let category2 = item.category2 || legacy[1];
    if (category1 === "\uae30\ud0c0") {
      category1 = "\uac74\ubb3c\ube4c\ub529";
      category2 = "\uac74\ubb3c";
    }
    return { category1, category2 };
  }

  function getTypeFromCategory(category1, category2, fallback = "etc") {
    return DETAIL_CATEGORY_TO_TYPE[`${category1}|${category2}`] || fallback || "etc";
  }

  function renderEditCategory2Options(selectedValue = "") {
    const cat1El = document.getElementById("edit_category1");
    const cat2El = document.getElementById("edit_category2");
    const opts = DETAIL_CATEGORY_OPTIONS[cat1El.value] || [];
    cat2El.innerHTML = opts.map(v => `<option value="${v}">${v}</option>`).join("");
    cat2El.value = opts.includes(selectedValue) ? selectedValue : (opts[0] || "");
    updateEditCategoryType();
  }

  function updateEditCategoryType() {
    const cat1 = document.getElementById("edit_category1")?.value || "";
    const cat2 = document.getElementById("edit_category2")?.value || "";
    const hidden = document.getElementById("edit_propertyType");
    if (hidden) hidden.value = getTypeFromCategory(cat1, cat2);
  }

  function renderEditImagePreview() {
    const wrap = document.getElementById("edit_image_preview");
    if (!wrap) return;
    const existingHtml = _editImageUrls.map((url, idx) => `
      <span class="image-preview-thumb">
        <img src="${url}" alt="listing image ${idx + 1}" />
        <button type="button" onclick="removeEditImage(${idx})">&times;</button>
      </span>
    `).join("");
    const newHtml = _editNewImageFiles.map((file, idx) => `
      <span class="image-preview-thumb">
        <img src="${URL.createObjectURL(file)}" alt="new listing image ${idx + 1}" />
        <button type="button" onclick="removeEditNewImage(${idx})">&times;</button>
      </span>
    `).join("");
    wrap.innerHTML = existingHtml + newHtml;
    updateEditImageSlots();
  }

  function updateEditImageSlots() {
    const total = _editImageUrls.length + _editNewImageFiles.length;
    const countEl = document.getElementById("editImageCount");
    if (countEl) countEl.textContent = `${total} / ${MAX_LISTING_IMAGES}`;
    const addBtn = document.getElementById("editAddImageSlotBtn");
    if (addBtn) addBtn.disabled = total >= MAX_LISTING_IMAGES;
  }

  function addEditImageSlot() {
    const total = _editImageUrls.length + _editNewImageFiles.length;
    if (total >= MAX_LISTING_IMAGES) {
      showToast(`이미지는 최대 ${MAX_LISTING_IMAGES}장까지 업로드할 수 있습니다.`);
      return;
    }
    const slots = document.getElementById("edit_image_slots");
    if (!slots) return;
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.multiple = true;
    input.className = "edit-img-slot";
    input.style.fontSize = "0.82rem";
    slots.appendChild(input);
    input.click();
  }

  function handleEditImageSlotChange(input) {
    const files = Array.from(input.files || []).filter(f => f.type.startsWith("image/"));
    const remaining = MAX_LISTING_IMAGES - _editImageUrls.length - _editNewImageFiles.length;
    const toAdd = files.slice(0, remaining);
    if (files.length > remaining) {
      showToast(`이미지는 최대 ${MAX_LISTING_IMAGES}장까지 업로드할 수 있습니다.`);
    }
    _editNewImageFiles = _editNewImageFiles.concat(toAdd);
    input.value = "";
    renderEditImagePreview();
  }

  function removeEditImage(idx) {
    _editImageUrls.splice(idx, 1);
    renderEditImagePreview();
  }

  function removeEditNewImage(idx) {
    _editNewImageFiles.splice(idx, 1);
    renderEditImagePreview();
  }


  async function loadDriveResourcesForSelect() {
    try {
      _allDriveResources = await getDriveResources();
    } catch(e) { _allDriveResources = []; }
    const sel = document.getElementById("edit_resource_id");
    sel.innerHTML = `<option value="">-- 연결 안함 --</option>` +
      _allDriveResources.map(r => `<option value="${r.id}">${r.category} · ${r.name}</option>`).join("");
  }

  // ── 수정 모달 ──
  function openEditModal(item) {
    const category = getCategoryFromItem(item);
    document.getElementById("edit_category1").value = category.category1;
    renderEditCategory2Options(category.category2);
    document.getElementById("edit_address").value = item.address || "";
    document.getElementById("edit_quick_price").value = item.quick_price || "";
    document.getElementById("edit_owner_contact").value = item.owner_contact || item.quick_contact || "";
    document.getElementById("edit_memo").value = item.quick_memo || item.description || "";
    document.getElementById("edit_resource_id").value = item.resource_id || "";
    document.getElementById("edit_is_public").checked = item.is_public === true;
    const slots = document.getElementById("edit_image_slots");
    if (slots) slots.innerHTML = '<input class="edit-img-slot" type="file" accept="image/*" multiple style="font-size:0.82rem;" />';
    _editImageUrls = getListingImageUrls(item);
    _editNewImageFiles = [];
    renderEditImagePreview();
    document.getElementById("editModal").style.display = "flex";
  }

  function showToast(msg, duration=2000) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), duration);
  }

  document.getElementById("edit_image_slots")?.addEventListener("change", function(e) {
    if (e.target.classList.contains("edit-img-slot")) handleEditImageSlotChange(e.target);
  });
  document.getElementById("editAddImageSlotBtn")?.addEventListener("click", addEditImageSlot);
  document.getElementById("edit_category1")?.addEventListener("change", () => renderEditCategory2Options());
  document.getElementById("edit_category2")?.addEventListener("change", updateEditCategoryType);

  function getTypeLabel(type) {
    const map = { shop:"상가", office:"사무실", officetel:"오피스텔", hilsstate:"힐스테이트더운정", factory:"공장/창고", bizcenter:"지식산업센터", etc:"기타" };
    if (map[type]) return map[type];
    if (type && type.startsWith("land")) return "토지";
    return "기타";
  }

  function row(label, value) {
    if (!value) return "";
    return `<div><div class="info-label">${label}</div><div class="info-value">${value}</div></div>`;
  }

  function renderDetail(item) {
    let html = "";
    const imageUrls = getListingImageUrls(item);

    // 상태 배지
    if (item.status === "거래완료") {
      html += `<div class="deal-status">거래완료</div>`;
    }

    // 제목
    html += `<div class="detail-title">${item.title || getTypeLabel(item.type)}</div>`;

    // 액션 버튼
    html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">`;
    if (item.status !== "거래완료") {
      html += `<button class="btn btn-success" id="doneBtn">✅ 거래완료 처리</button>`;
    } else {
      html += `<button class="btn btn-ghost" id="undoneBtn">↩ 광고중으로 변경</button>`;
    }
    const _contact = item.owner_contact || item.quick_contact;
    if (_contact) {
      html += `<a class="contact-btn" href="tel:${_contact}">📞 ${_contact}</a>`;
    }
    if (item.resource_id) {
      const res = _allDriveResources.find(r => r.id === item.resource_id);
      if (res && res.url) {
        html += `<a class="btn btn-ghost" href="${res.url}" target="_blank" style="text-decoration:none;">📁 자료보기</a>`;
      }
    }
    html += `<button class="btn btn-ghost" id="printBriefBtn">🖨 설명서 출력</button>`;
    html += `<button class="btn btn-primary" id="editBtn">✏️ 수정</button>`;
    html += `<button class="btn btn-danger" id="deleteBtn">🗑 삭제</button>`;
    html += `<button class="btn btn-primary" id="sendHomeBtn">${item.is_public === true ? "&#44277;&#44060; &#52712;&#49548;" : "&#54856;&#54168;&#51060;&#51648; &#44277;&#44060;"}</button>`;
    html += `</div>`;

    html += `<div style="margin-bottom:8px;"><span class="badge" style="background:${item.is_public === true ? 'rgba(80,180,100,0.18)' : 'rgba(255,255,255,0.06)'};color:${item.is_public === true ? '#5cb85c' : 'var(--text-muted)'};border:1px solid ${item.is_public === true ? 'rgba(80,180,100,0.35)' : 'rgba(255,255,255,0.12)'};">${item.is_public === true ? '&#54856;&#54168;&#51060;&#51648; &#44277;&#44060;&#51473;' : '&#48708;&#44277;&#44060;'}</span></div>`;
    if (imageUrls.length) {
      html += `<div class="desc-card"><div class="desc-title">&#47588;&#47932; &#51060;&#48120;&#51648;</div><img class="photo-main" src="${imageUrls[0]}" alt="listing main image" />${imageUrls.length > 1 ? `<div class="thumb-row">${imageUrls.slice(1).map((url, idx) => `<img class="thumb" src="${url}" alt="listing image ${idx + 2}" onclick="document.querySelector('.photo-main').src='${url}'" />`).join("")}</div>` : ""}</div>`;
    }

    // 기본 정보 카드
    html += `<div class="info-card"><div class="info-grid">`;
    html += row("매물구분", getTypeLabel(item.type));
    html += row("주소", item.address);
    html += row("집주인 연락처", item.owner_contact || item.quick_contact);

    if (item.type === "shop" || item.type === "office") {
      html += row("거래유형", item.shop_dealType);
      html += row("층수", item.shop_floor);
      html += row("전용면적", item.shop_area_py ? item.shop_area_py+"평" : "");
      html += row("보증금", item.shop_deposit ? Number(item.shop_deposit).toLocaleString("ko-KR")+"만원" : "");
      html += row("월세", item.shop_monthlyRent ? Number(item.shop_monthlyRent).toLocaleString("ko-KR")+"만원" : "");
      html += row("관리비", item.shop_maintenance ? item.shop_maintenance+"만원" : "");
      html += row("권리금", item.shop_premium);
      html += row("임대상태", item.shop_status);
      html += row("예상 수익률", item.shop_yield ? item.shop_yield+"%" : "");
      html += row("주차", item.shop_parking);
      html += row("입주가능일", item.shop_available);
    }
    if (item.type === "officetel" || item.type === "hilsstate") {
      if (item.type === "hilsstate") html += row("단지명", "힐스테이트더운정");
      else html += row("단지명", item.officetel_complex);
      html += row("타입", item.officetel_type);
      html += row("구조", item.officetel_structure);
      html += row("층수", item.officetel_floor);
      html += row("거래유형", item.officetel_dealType);
      html += row("금액", item.officetel_price ? Number(item.officetel_price).toLocaleString("ko-KR")+"만원" : "");
      html += row("전용면적", item.officetel_area_py ? item.officetel_area_py+"평" : "");
      html += row("향", item.officetel_direction);
      html += row("일반사업자", item.officetel_biz);
      html += row("전입", item.officetel_resident);
      html += row("주차", item.officetel_parking);
      html += row("입주가능일", item.officetel_available);
    }
    if (item.type && item.type.startsWith("land")) {
      html += row("토지종류", item.land_kind);
      html += row("면적", item.land_area_py ? item.land_area_py+"평" : "");
      html += row("지목", item.land_jimok);
      html += row("용도지역", item.land_zone);
      html += row("건폐율", item.land_coverage ? item.land_coverage+"%" : "");
      html += row("용적률", item.land_far ? item.land_far+"%" : "");
      html += row("도로", item.land_road);
      html += row("형상", item.land_shape);
      html += row("매매가", item.land_price ? Number(item.land_price).toLocaleString("ko-KR")+"만원" : "");
    }
    if (item.type === "factory") {
      html += row("구분", item.factory_kind);
      html += row("대지면적", item.factory_siteArea_py ? item.factory_siteArea_py+"평" : "");
      html += row("건물면적", item.factory_buildArea_py ? item.factory_buildArea_py+"평" : "");
      html += row("층고", item.factory_height ? item.factory_height+"m" : "");
      html += row("전력", item.factory_power ? item.factory_power+"kW" : "");
      html += row("대형차", item.factory_truck);
      html += row("거래유형", item.factory_dealType);
      html += row("금액", item.factory_price ? Number(item.factory_price).toLocaleString("ko-KR")+"만원" : "");
      html += row("주차", item.factory_parking);
      html += row("입주가능일", item.factory_available);
    }
    if (item.type === "bizcenter") {
      html += row("센터명", item.biz_name);
      html += row("구분", item.biz_kind);
      html += row("층수", item.biz_floor);
      html += row("전용면적", item.biz_privArea_py ? item.biz_privArea_py+"평" : "");
      html += row("거래유형", item.biz_dealType);
      html += row("금액", item.biz_price ? Number(item.biz_price).toLocaleString("ko-KR")+"만원" : "");
      html += row("주차", item.biz_parking);
      html += row("입주가능일", item.biz_available);
    }

    // 빠른등록 가격
    if (item.quick_price) html += row("가격(메모)", item.quick_price);

    html += `</div></div>`;

    // 메모/설명
    if (item.description || item.quick_memo) {
      html += `<div class="desc-card">
        <div class="desc-title">📝 메모 / 상세 설명</div>
        <div style="font-size:0.88rem;line-height:1.6;">${(item.description||item.quick_memo||"").replace(/\n/g,"<br>")}</div>
      </div>`;
    }

    // 빌딩자료 보기 (resource_id 연결된 경우)
    if (item.resource_id) {
      const res = _allDriveResources.find(r => r.id === item.resource_id);
      if (res) {
        const memoHtml = res.memo
          ? `<div style="margin-top:8px;font-size:0.82rem;color:var(--text-muted);line-height:1.6;white-space:pre-wrap;">${res.memo.replace(/</g,'&lt;')}</div>`
          : "";
        html += `<div class="desc-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <div class="desc-title" style="margin-bottom:0;">🏢 연결된 빌딩 자료</div>
            ${res.url ? `<a href="${res.url}" target="_blank" class="btn btn-primary" style="font-size:0.78rem;padding:5px 14px;text-decoration:none;">📁 빌딩자료 보기</a>` : ""}
          </div>
          <div style="font-size:0.88rem;color:var(--gold-soft);">${res.category || ""} · ${res.name || ""}</div>
          ${memoHtml}
        </div>`;
      }
    }

    // 드라이브 링크
    const links = item.drive_links || [];
    html += `<div class="desc-card" id="driveLinksCard">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div class="desc-title" style="margin-bottom:0;">📁 드라이브 링크</div>
        <button class="btn btn-ghost" style="font-size:0.78rem;padding:4px 10px;" onclick="showAddLinkForm()">+ 링크 추가</button>
      </div>
      <div id="driveLinksArea">
        ${links.length ? links.map((l,i)=>`
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;padding:6px 8px;background:rgba(255,255,255,0.04);border-radius:6px;">
            <span style="flex:1;font-size:0.88rem;color:var(--gold-soft);">📄 ${l.name||"링크"}</span>
            <a href="${l.url}" target="_blank" class="btn btn-primary" style="font-size:0.75rem;padding:3px 12px;text-decoration:none;">열기</a>
            <button onclick="deleteDriveLink(${i})" style="background:none;border:none;color:var(--red,#e05252);cursor:pointer;font-size:1rem;padding:0 4px;">✕</button>
          </div>`).join("")
        : `<div style="font-size:0.82rem;color:var(--text-muted);">등록된 링크가 없습니다</div>`}
      </div>
      <div id="addLinkForm" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid rgba(212,175,55,0.15);">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <input id="newLinkName" type="text" placeholder="이름 (예: 토지대장)" style="width:130px;flex-shrink:0;" />
          <input id="newLinkUrl" type="text" placeholder="https://drive.google.com/..." style="flex:1;min-width:160px;" />
          <button class="btn btn-primary" style="font-size:0.82rem;padding:5px 14px;flex-shrink:0;" onclick="addDriveLink()">저장</button>
          <button class="btn btn-ghost" style="font-size:0.82rem;padding:5px 10px;flex-shrink:0;" onclick="document.getElementById('addLinkForm').style.display='none'">취소</button>
        </div>
      </div>
    </div>`;

    // 등록일
    if (item.created_at) {
      const d = new Date(item.created_at);
      html += `<div style="margin-top:12px;font-size:0.75rem;color:var(--text-muted);text-align:right;">등록일: ${d.toLocaleDateString("ko-KR")}</div>`;
    }

    return html;
  }

  // ── 드라이브 링크 추가 / 삭제 ──
  let _currentItem = null;

  function showAddLinkForm() {
    document.getElementById("addLinkForm").style.display = "block";
    document.getElementById("newLinkName").focus();
  }

  async function addDriveLink() {
    const name = document.getElementById("newLinkName").value.trim();
    const url  = document.getElementById("newLinkUrl").value.trim();
    if (!url) { showToast("URL을 입력해주세요"); return; }
    const links = [...(_currentItem.drive_links || []), { name: name || "링크", url }];
    try {
      await updateListing(_currentItem.id, Object.assign({}, _currentItem, { drive_links: links }));
      _currentItem.drive_links = links;
      showToast("✅ 링크가 추가되었습니다");
      document.getElementById("detailArea").innerHTML = renderDetail(_currentItem);
      rebindButtons();
    } catch(e) { showToast("❌ 실패: " + e.message); }
  }

  async function deleteDriveLink(idx) {
    if (!confirm("이 링크를 삭제하시겠습니까?")) return;
    const links = (_currentItem.drive_links || []).filter((_,i) => i !== idx);
    try {
      await updateListing(_currentItem.id, Object.assign({}, _currentItem, { drive_links: links }));
      _currentItem.drive_links = links;
      showToast("🗑 링크가 삭제되었습니다");
      document.getElementById("detailArea").innerHTML = renderDetail(_currentItem);
      rebindButtons();
    } catch(e) { showToast("❌ 실패: " + e.message); }
  }

  function mapPropertyType(type) {
    const m = { shop:"상가", officetel:"오피스텔", apartment:"아파트", bizcenter:"지식산업센터",
      factory:"공장/창고", land_dev:"토지(시행)", land_single:"토지(단독)", land_general:"토지(일반)" };
    return m[type] || "상가";
  }

  function formatLegacyDesc(item) {
    const lines = [];
    if (item.address) lines.push("주소: " + item.address);
    if (item.title) lines.push("제목: " + item.title);
    if (item.type === "shop" || item.type === "office") {
      if (item.shop_dealType) lines.push("거래유형: " + item.shop_dealType);
      if (item.shop_floor) lines.push("층수: " + item.shop_floor);
      if (item.shop_area_py) lines.push("전용면적: " + item.shop_area_py + "평");
      if (item.shop_deposit) lines.push("보증금: " + Number(item.shop_deposit).toLocaleString("ko-KR") + "만원");
      if (item.shop_monthlyRent) lines.push("월세: " + Number(item.shop_monthlyRent).toLocaleString("ko-KR") + "만원");
      if (item.shop_maintenance) lines.push("관리비: " + item.shop_maintenance + "만원");
      if (item.shop_premium) lines.push("권리금: " + item.shop_premium);
      if (item.shop_status) lines.push("임대상태: " + item.shop_status);
      if (item.shop_available) lines.push("입주가능일: " + item.shop_available);
    }
    if (item.type === "officetel" || item.type === "hilsstate") {
      if (item.officetel_dealType) lines.push("거래유형: " + item.officetel_dealType);
      if (item.officetel_floor) lines.push("층수: " + item.officetel_floor);
      if (item.officetel_area_py) lines.push("전용면적: " + item.officetel_area_py + "평");
      if (item.officetel_price) lines.push("금액: " + Number(item.officetel_price).toLocaleString("ko-KR") + "만원");
      if (item.officetel_direction) lines.push("향: " + item.officetel_direction);
      if (item.officetel_available) lines.push("입주가능일: " + item.officetel_available);
    }
    if (item.type && item.type.startsWith("land")) {
      if (item.land_area_py) lines.push("면적: " + item.land_area_py + "평");
      if (item.land_jimok) lines.push("지목: " + item.land_jimok);
      if (item.land_zone) lines.push("용도지역: " + item.land_zone);
      if (item.land_price) lines.push("매매가: " + Number(item.land_price).toLocaleString("ko-KR") + "만원");
    }
    if (item.type === "factory") {
      if (item.factory_area_py) lines.push("건축면적: " + item.factory_area_py + "평");
      if (item.factory_land_py) lines.push("대지면적: " + item.factory_land_py + "평");
      if (item.factory_price) lines.push("가격: " + Number(item.factory_price).toLocaleString("ko-KR") + "만원");
    }
    if (item.description) lines.push("메모: " + item.description);
    return lines.join("\n");
  }

  function buildHomepagePrefill(item) {
    return {
      propertyType: mapPropertyType(item.type),
      title: item.title || "",
      description: formatLegacyDesc(item)
    };
  }

  function rebindButtons() {
    const item = _currentItem;
    const id   = item.id;
    const doneBtn   = document.getElementById("doneBtn");
    const undoneBtn = document.getElementById("undoneBtn");
    if (doneBtn) doneBtn.addEventListener("click", async () => {
      doneBtn.disabled = true;
      try { await updateListingStatus(id, "거래완료"); showToast("✅ 거래완료 처리됐어요!"); setTimeout(() => location.href = "index.html", 1200); }
      catch(e) { showToast("❌ 실패: "+e.message); doneBtn.disabled = false; }
    });
    if (undoneBtn) undoneBtn.addEventListener("click", async () => {
      undoneBtn.disabled = true;
      try { await updateListingStatus(id, "광고중"); showToast("↩ 광고중으로 변경됐어요!"); setTimeout(() => location.reload(), 1200); }
      catch(e) { showToast("❌ 실패: "+e.message); undoneBtn.disabled = false; }
    });
    const printBriefBtn = document.getElementById("printBriefBtn");
    if (printBriefBtn) {
      printBriefBtn.addEventListener("click", () => {
        location.href = `property-print.html?id=${item.id}`;
      });
    }
    document.getElementById("editBtn").addEventListener("click", () => openEditModal(item));
    document.getElementById("deleteBtn").addEventListener("click", () => { document.getElementById("deleteModal").style.display = "flex"; });
    const sendHomeBtn = document.getElementById("sendHomeBtn");
    if (sendHomeBtn) {
      sendHomeBtn.addEventListener("click", async () => {
        const nextPublic = _currentItem.is_public !== true;
        sendHomeBtn.disabled = true;
        try {
          await updateListingPublic(id, nextPublic);
          _currentItem.is_public = nextPublic;
          showToast(nextPublic ? "Homepage listing is now public." : "Homepage listing is now private.");
          document.getElementById("detailArea").innerHTML = renderDetail(_currentItem);
          rebindButtons();
        } catch(e) {
          closeHomepageTab(homepageTab);
          showToast("Public status update failed: " + e.message);
          sendHomeBtn.disabled = false;
        }
      });
    }
  }

  async function init() {
    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    if (!id) { document.getElementById("detailArea").innerHTML = "<div class='desc-card'>잘못된 접근입니다.</div>"; return; }

    try {
      await loadDriveResourcesForSelect();
      const item = await getListingById(id);
      if (!item) { document.getElementById("detailArea").innerHTML = "<div class='desc-card'>매물을 찾을 수 없습니다.</div>"; return; }

      _currentItem = item;
      document.getElementById("detailArea").innerHTML = renderDetail(item);
      rebindButtons();

      // 수정
      document.getElementById("editSaveBtn").addEventListener("click", async () => {
        const btn = document.getElementById("editSaveBtn");
        btn.disabled = true; btn.textContent = "저장 중...";
        updateEditCategoryType();
        const category1 = document.getElementById("edit_category1").value;
        const category2 = document.getElementById("edit_category2").value;
        const type    = document.getElementById("edit_propertyType").value;
        const address = document.getElementById("edit_address").value.trim();
        const price   = document.getElementById("edit_quick_price").value.trim();
        const contact = document.getElementById("edit_owner_contact").value.trim();
        const memo    = document.getElementById("edit_memo").value.trim();

        const resource_id = document.getElementById("edit_resource_id").value || null;
        const isPublic = document.getElementById("edit_is_public").checked;
        const newImageFiles = _editNewImageFiles;
        const updated = Object.assign({}, item, {
          type,
          category1,
          category2,
          address,
          quick_price:   price,
          owner_contact: contact,
          quick_contact: contact,
          quick_memo:    memo,
          description:   memo,
          resource_id,
          is_public: isPublic,
          image_urls: _editImageUrls,
          imageUrls: _editImageUrls,
          title: item.title || `${getTypeLabel(type)} · ${address || price || "주소미입력"}`,
          drive_links:   item.drive_links || []
        });

        try {
          if (newImageFiles.length) {
            const uploadedUrls = await uploadListingImages(newImageFiles, id, _editImageUrls.length);
            updated.image_urls = _editImageUrls.concat(uploadedUrls).slice(0, MAX_LISTING_IMAGES);
            updated.imageUrls = updated.image_urls;
          }
          await updateListing(id, updated);
          _currentItem = updated;
          showToast("✅ 수정완료!");
          document.getElementById("editModal").style.display = "none";
          setTimeout(() => location.reload(), 1000);
        } catch(e) {
          showToast("❌ 수정 실패: " + e.message);
          btn.disabled = false; btn.textContent = "저장";
        }
      });

      // 삭제 확인
      document.getElementById("confirmDeleteBtn").addEventListener("click", async () => {
        try {
          await deleteListing(id);
          showToast("🗑 삭제됐어요");
          setTimeout(() => location.href = "index.html", 1000);
        } catch(e) { showToast("❌ 삭제 실패: "+e.message); }
      });

    } catch(e) {
      document.getElementById("detailArea").innerHTML = "";
      showAppError(e.message || "데이터를 불러오지 못했습니다. 새로고침 해주세요.");
    }
  }

  init();
</script>
</body>
</html>
