<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>매물 등록 - 하이탑부동산</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="assets/css/style.css?v=20260604-address-split" />
  <script src="assets/js/storage.js?v=20260604-address-split"></script>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="logo-icon"></div>
    <div class="logo-text">
      <div class="logo-main">HITOP 부동산</div>
      <div class="logo-sub">파주/운정을 가장 잘 아는 상가·토지·오피스텔 전문</div>
    </div>
  </header>
  <div class="header-line"></div>

  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
    <button class="btn btn-ghost" onclick="history.back()">← 뒤로</button>
    <h1 class="page-title" style="margin:0;">매물 상세 등록</h1>
  </div>

  <!-- ① 기본정보 -->
  <section class="card">
    <div class="card-title"><span>📋 기본정보</span></div>
    <div class="form-grid-2">
      <div class="field">
        <label>1차구분 <span style="color:var(--gold)">*</span></label>
        <select id="category1Select">
          <option value="">선택하세요</option>
          <option value="공장창고">공장·창고</option>
          <option value="상가사무실">상가·사무실</option>
          <option value="토지">토지</option>
          <option value="주거용">주거용</option>
          <option value="단독전원주택">단독·전원주택</option>
          <option value="건물빌딩">건물·빌딩</option>
        </select>
      </div>
      <div class="field">
        <label>2차구분 <span style="color:var(--gold)">*</span></label>
        <select id="category2Select">
          <option value="">1차구분을 먼저 선택하세요</option>
        </select>
        <input id="propertyType" type="hidden" value="" />
      </div>
      <div class="field">
        <label>거래유형 <span style="color:var(--gold)">*</span></label>
        <select id="dealType">
          <option value="">선택하세요</option>
          <option value="매매">매매</option>
          <option value="전세">전세</option>
          <option value="월세">월세</option>
          <option value="임대">임대</option>
        </select>
      </div>
      <div class="field">
        <label>거래상태</label>
        <select id="status">
          <option value="광고중">광고중</option>
          <option value="거래완료">거래완료</option>
        </select>
      </div>
      <div class="field">
        <label>공개주소 <span style="font-size:0.78rem;color:var(--gold-soft,#c9a84c);">고객에게 보이는 주소</span></label>
        <input id="publicAddress" type="text" placeholder="예) 파주시 동패동, 운정역 인근" />
      </div>
      <div class="field">
        <label>지도검색주소 <span style="font-size:0.78rem;color:#888;">🔒 비공개 · 지도 마커용</span></label>
        <input id="mapAddress" type="text" placeholder="예) 파주시 동패동 2075, 경기 파주시 숲속노을로 150" />
      </div>
      <div class="field">
        <label>상세주소·동호수 <span style="font-size:0.78rem;color:#888;">🔒 비공개 · 내부관리용</span></label>
        <input id="privateDetailAddress" type="text" placeholder="예) 115동 1층, 상가 101호, B동 203호" />
      </div>
    </div>
    <div class="field" style="margin-top:10px;">
      <label>제목 <span style="color:var(--gold)">*</span></label>
      <input id="title" type="text" placeholder="매물 제목 (최대 20자)" maxlength="20" />
    </div>
  </section>

  <!-- ② 가격정보 -->
  <section class="card">
    <div class="card-title"><span>💰 가격정보</span></div>
    <div class="form-grid-2">
      <div class="field">
        <label>매매가</label>
        <input id="salePrice" type="text" placeholder="예: 12억 5,000만" />
        <div class="price-preview" id="salePrice_preview"></div>
      </div>
      <div class="field">
        <label>분양가</label>
        <input id="presalePrice" type="text" placeholder="예: 8억 9,000만" />
        <div class="price-preview" id="presalePrice_preview"></div>
      </div>
      <div class="field">
        <label>보증금</label>
        <input id="deposit" type="text" placeholder="예: 5,000만" />
        <div class="price-preview" id="deposit_preview"></div>
      </div>
      <div class="field">
        <label>월세</label>
        <input id="monthlyRent" type="text" placeholder="예: 300만" />
        <div class="price-preview" id="monthlyRent_preview"></div>
      </div>
      <div class="field">
        <label>관리비</label>
        <input id="managementFee" type="text" placeholder="예: 15만" />
        <div class="price-preview" id="managementFee_preview"></div>
      </div>
      <div class="field">
        <label>권리금</label>
        <input id="premium" type="text" placeholder="예: 없음 또는 2,000만" />
        <div class="price-preview" id="premium_preview"></div>
      </div>
    </div>
  </section>

  <!-- ③ 면적정보 — 토지 -->
  <section class="card area-section area-land" style="display:none;">
    <div class="card-title"><span>📐 면적정보</span></div>
    <div class="area-row">
      <span class="area-label">토지면적</span>
      <input id="areaM2" type="number" min="0" step="0.01" placeholder="0.00" />
      <span class="area-unit">㎡</span>
      <input id="areaPy" type="number" min="0" step="1" placeholder="0" />
      <span class="area-unit">평</span>
    </div>
  </section>

  <!-- ③ 면적정보 — 전용+공급 (상가사무실·주거용) -->
  <section class="card area-section area-exclusive" style="display:none;">
    <div class="card-title"><span>📐 면적정보</span></div>
    <div class="area-row">
      <span class="area-label">전용면적</span>
      <input id="exclusiveAreaM2" type="number" min="0" step="0.01" placeholder="0.00" />
      <span class="area-unit">㎡</span>
      <input id="exclusiveAreaPy" type="number" min="0" step="1" placeholder="0" />
      <span class="area-unit">평</span>
    </div>
    <div class="area-row" style="margin-top:6px;">
      <span class="area-label">공급면적</span>
      <input id="supplyAreaM2" type="number" min="0" step="0.01" placeholder="0.00" />
      <span class="area-unit">㎡</span>
      <input id="supplyAreaPy" type="number" min="0" step="1" placeholder="0" />
      <span class="area-unit">평</span>
    </div>
  </section>

  <!-- ③ 면적정보 — 대지+건축+연 (공장창고·단독전원주택·건물빌딩) -->
  <section class="card area-section area-building" style="display:none;">
    <div class="card-title"><span>📐 면적정보</span></div>
    <div class="area-row">
      <span class="area-label">대지면적</span>
      <input id="landAreaM2" type="number" min="0" step="0.01" placeholder="0.00" />
      <span class="area-unit">㎡</span>
      <input id="landAreaPy" type="number" min="0" step="1" placeholder="0" />
      <span class="area-unit">평</span>
    </div>
    <div class="area-row" style="margin-top:6px;">
      <span class="area-label">건축면적</span>
      <input id="buildingAreaM2" type="number" min="0" step="0.01" placeholder="0.00" />
      <span class="area-unit">㎡</span>
      <input id="buildingAreaPy" type="number" min="0" step="1" placeholder="0" />
      <span class="area-unit">평</span>
    </div>
    <div class="area-row" style="margin-top:6px;">
      <span class="area-label">연면적</span>
      <input id="totalFloorAreaM2" type="number" min="0" step="0.01" placeholder="0.00" />
      <span class="area-unit">㎡</span>
      <input id="totalFloorAreaPy" type="number" min="0" step="1" placeholder="0" />
      <span class="area-unit">평</span>
    </div>
  </section>

  <!-- ④ 추가정보 — 공장창고·상가사무실·건물빌딩 -->
  <section class="card commercial-section" style="display:none;">
    <div class="card-title">
      <span>🏢 추가정보</span>
      <span style="font-size:0.78rem;color:var(--text-muted);">공장·상가·건물</span>
    </div>
    <div class="form-grid-2">
      <div class="field">
        <label>층정보</label>
        <input id="floorInfo" type="text" placeholder="예: 지상 1층" />
      </div>
      <div class="field">
        <label>용도지역</label>
        <input id="zoning" type="text" placeholder="예: 준공업지역" />
      </div>
      <div class="field">
        <label>주차대수</label>
        <input id="parkingCount" type="text" placeholder="예: 10대" />
      </div>
      <div class="field">
        <label>사용승인일</label>
        <input id="approvalDate" type="text" placeholder="예: 2010-03-15" />
      </div>
    </div>
  </section>

  <!-- ⑤ 홍보스티커 -->
  <section class="card">
    <div class="card-title"><span>🏷️ 홍보스티커</span></div>
    <div class="sticker-grid">
      <label class="sticker-chip"><input type="checkbox" name="stickers" value="추천매물" /> 추천매물</label>
      <label class="sticker-chip"><input type="checkbox" name="stickers" value="급매물" /> 급매물</label>
      <label class="sticker-chip"><input type="checkbox" name="stickers" value="수익형" /> 수익형</label>
      <label class="sticker-chip"><input type="checkbox" name="stickers" value="역세권" /> 역세권</label>
      <label class="sticker-chip"><input type="checkbox" name="stickers" value="즉시입주" /> 즉시입주</label>
      <label class="sticker-chip"><input type="checkbox" name="stickers" value="단독공장" /> 단독공장</label>
      <label class="sticker-chip"><input type="checkbox" name="stickers" value="민원적음" /> 민원적음</label>
      <label class="sticker-chip"><input type="checkbox" name="stickers" value="추천업종" /> 추천업종</label>
      <label class="sticker-chip"><input type="checkbox" name="stickers" value="권리금없음" /> 권리금없음</label>
    </div>
  </section>

  <!-- ⑥ 매물설명 -->
  <section class="card">
    <div class="card-title"><span>📝 매물설명</span></div>
    <div class="field" style="margin-bottom:10px;">
      <label>공개 매물설명 <span style="color:var(--text-muted);font-size:0.75rem;">(상세보기 표시)</span></label>
      <textarea id="detailDescription" rows="4" placeholder="입지, 도로접근성, 추천업종, 임대조건, 특이사항 등"></textarea>
    </div>
    <div class="field">
      <label>내부 메모 <span style="color:var(--text-muted);font-size:0.75rem;">(비공개)</span></label>
      <textarea id="description" rows="3" placeholder="관리용 메모 / 특이사항"></textarea>
    </div>
  </section>

  <!-- ⑦ 내부전용 -->
  <section class="card">
    <div class="card-title"><span>🔒 내부전용</span></div>
    <div class="form-grid-2">
      <div class="field">
        <label>집주인 연락처</label>
        <input id="owner_contact" type="tel" placeholder="010-0000-0000" />
      </div>
      <div class="field">
        <label>드라이브 자료 연결</label>
        <select id="resource_id">
          <option value="">-- 연결 안함 --</option>
        </select>
      </div>
    </div>
  </section>

  <!-- ⑧ 이미지 -->
  <section class="card">
    <div class="card-title"><span>📷 이미지 (최대 5장)</span></div>
    <div id="imageUploadPreview" class="image-preview-row"></div>
    <div id="imageUploadSlots" style="margin-top:8px;display:flex;flex-direction:column;gap:6px;">
      <input class="reg-img-slot" type="file" accept="image/*" multiple style="font-size:0.82rem;" />
    </div>
    <div style="margin-top:6px;display:flex;align-items:center;gap:10px;">
      <button type="button" id="addImageSlotBtn" class="btn btn-ghost" style="font-size:0.82rem;padding:4px 10px;">+ 추가</button>
      <span id="imageCount" style="font-size:0.78rem;color:var(--text-muted);">0 / 5</span>
    </div>
  </section>

  <!-- ⑨ 공개 + 저장 -->
  <section class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
      <label style="display:flex;align-items:center;gap:10px;font-size:0.9rem;color:var(--text-main);cursor:pointer;">
        <input id="is_public" type="checkbox" style="width:auto;accent-color:var(--gold);" />
        홈페이지 공개
      </label>
      <button class="btn btn-primary" id="saveBtn">저장하기</button>
    </div>
  </section>

</div>
<div id="toast"></div>

<script>
  // ── 카테고리 ──────────────────────────────────────
  const AREA_MAP = {
    '공장창고':    'building',
    '상가사무실':  'exclusive',
    '토지':        'land',
    '주거용':      'exclusive',
    '단독전원주택':'building',
    '건물빌딩':    'building',
  };
  const COMMERCIAL_CATS = ['공장창고', '상가사무실', '건물빌딩'];

  const cat1El = document.getElementById('category1Select');
  const cat2El = document.getElementById('category2Select');

  function renderCat2() {
    const opts = CATEGORY_OPTIONS[cat1El.value] || [];
    cat2El.innerHTML = opts.length
      ? opts.map(v => `<option value="${v}">${v}</option>`).join('')
      : '<option value="">1차구분을 먼저 선택하세요</option>';
    updateDynamicSections();
  }

  function updateDynamicSections() {
    const cat1 = cat1El.value;
    const cat2 = cat2El.value;
    document.getElementById('propertyType').value = (cat1 && cat2) ? getTypeFromCategory(cat1, cat2) : '';

    document.querySelectorAll('.area-section').forEach(el => el.style.display = 'none');
    const variant = AREA_MAP[cat1];
    if (variant) {
      const el = document.querySelector('.area-' + variant);
      if (el) el.style.display = '';
    }
    document.querySelector('.commercial-section').style.display =
      COMMERCIAL_CATS.includes(cat1) ? '' : 'none';
  }

  cat1El.addEventListener('change', renderCat2);
  cat2El.addEventListener('change', updateDynamicSections);

  // ── 면적 자동계산 (㎡ → 평) ──────────────────────
  const SQM_PY = [
    ['areaM2','areaPy'],
    ['exclusiveAreaM2','exclusiveAreaPy'],
    ['supplyAreaM2','supplyAreaPy'],
    ['landAreaM2','landAreaPy'],
    ['buildingAreaM2','buildingAreaPy'],
    ['totalFloorAreaM2','totalFloorAreaPy'],
  ];
  SQM_PY.forEach(([sqmId, pyId]) => {
    const sqmEl = document.getElementById(sqmId);
    const pyEl  = document.getElementById(pyId);
    if (sqmEl && pyEl) {
      sqmEl.addEventListener('input', () => {
        const v = parseFloat(sqmEl.value);
        pyEl.value = v > 0 ? (v / 3.3058).toFixed(1) : '';
      });
    }
  });

  // ── 이미지 ──────────────────────────────────────
  let _selectedImages = [];

  function renderImagePreview() {
    const wrap = document.getElementById('imageUploadPreview');
    if (!wrap) return;
    wrap.innerHTML = _selectedImages.map((file, idx) => `
      <span class="image-preview-thumb">
        <img src="${URL.createObjectURL(file)}" alt="image ${idx + 1}" />
        <button type="button" onclick="removeRegImage(${idx})">&times;</button>
      </span>
    `).join('');
    const countEl = document.getElementById('imageCount');
    if (countEl) countEl.textContent = `${_selectedImages.length} / ${MAX_LISTING_IMAGES}`;
    const addBtn = document.getElementById('addImageSlotBtn');
    if (addBtn) addBtn.disabled = _selectedImages.length >= MAX_LISTING_IMAGES;
  }

  function removeRegImage(idx) {
    _selectedImages.splice(idx, 1);
    renderImagePreview();
  }

  function handleRegImageSlot(input) {
    const files = Array.from(input.files || []).filter(f => f.type.startsWith('image/'));
    const remaining = MAX_LISTING_IMAGES - _selectedImages.length;
    const toAdd = files.slice(0, remaining);
    if (files.length > remaining) showToast(`이미지는 최대 ${MAX_LISTING_IMAGES}장까지 업로드할 수 있습니다.`);
    _selectedImages = _selectedImages.concat(toAdd);
    input.value = '';
    renderImagePreview();
  }

  document.getElementById('imageUploadSlots').addEventListener('change', function(e) {
    if (e.target.classList.contains('reg-img-slot')) handleRegImageSlot(e.target);
  });

  document.getElementById('addImageSlotBtn').addEventListener('click', function() {
    if (_selectedImages.length >= MAX_LISTING_IMAGES) {
      showToast(`이미지는 최대 ${MAX_LISTING_IMAGES}장까지 업로드할 수 있습니다.`);
      return;
    }
    const slots = document.getElementById('imageUploadSlots');
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*'; input.multiple = true;
    input.className = 'reg-img-slot'; input.style.fontSize = '0.82rem';
    slots.appendChild(input);
    input.click();
  });

  // ── 드라이브 자료 로드 ───────────────────────────
  async function loadResourceSelect() {
    try {
      const resources = await getDriveResources();
      const sel = document.getElementById('resource_id');
      resources.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.id;
        opt.textContent = `${r.category} · ${r.name}`;
        sel.appendChild(opt);
      });
    } catch(e) { /* silent */ }
  }

  // ── 토스트 ──────────────────────────────────────
  function showToast(msg, duration = 2000) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }


  // 가격 입력 미리보기
  const REGISTER_PRICE_IDS = ["salePrice","presalePrice","deposit","monthlyRent","managementFee","premium"];
  function registerPriceDigits(value) { return String(value || "").replace(/[^\d]/g, ""); }
  function registerFormatPriceInput(value) {
    const digits = registerPriceDigits(value);
    return digits ? Number(digits).toLocaleString("ko-KR") : "";
  }
  function registerFormatWonPreview(value) {
    const digits = registerPriceDigits(value);
    if (!digits) return "";
    const won = Number(digits);
    if (!won) return "";
    const eok = Math.floor(won / 100000000);
    const man = Math.floor((won % 100000000) / 10000);
    const rest = won % 10000;
    const parts = [];
    if (eok) parts.push(eok.toLocaleString("ko-KR") + "억");
    if (man) parts.push(man.toLocaleString("ko-KR") + "만원");
    if (!parts.length && rest) parts.push(rest.toLocaleString("ko-KR") + "원");
    return parts.length ? "약 " + parts.join(" ") : "";
  }
  function syncRegisterPricePreview(id) {
    const input = document.getElementById(id);
    const preview = document.getElementById(id + "_preview");
    if (!input || !preview) return;
    const formatted = registerFormatPriceInput(input.value);
    if (input.value && input.value !== formatted) input.value = formatted;
    const text = registerFormatWonPreview(input.value);
    preview.textContent = text;
    preview.classList.toggle("has-value", !!text);
  }
  function setupRegisterPricePreviews() {
    REGISTER_PRICE_IDS.forEach(id => {
      const input = document.getElementById(id);
      if (!input || input.dataset.pricePreviewBound === "1") return;
      input.dataset.pricePreviewBound = "1";
      input.addEventListener("input", () => syncRegisterPricePreview(id));
      input.addEventListener("blur", () => syncRegisterPricePreview(id));
      syncRegisterPricePreview(id);
    });
  }
  function cleanRegisterPriceInputs() {
    REGISTER_PRICE_IDS.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = registerPriceDigits(el.value);
    });
  }
  document.addEventListener("DOMContentLoaded", setupRegisterPricePreviews);


  // ── 저장 ────────────────────────────────────────
  document.getElementById('saveBtn').addEventListener('click', async () => {
    const cat1 = cat1El.value;
    const cat2 = cat2El.value;
    if (!cat1 || !cat2) { showToast('1차·2차구분을 선택하세요'); return; }
    const title = document.getElementById('title').value.trim();
    if (!title) { showToast('제목을 입력하세요'); return; }

    const type = document.getElementById('propertyType').value || 'etc';
    const stickers = Array.from(document.querySelectorAll('input[name="stickers"]:checked')).map(c => c.value);

    const g = id => document.getElementById(id);
    cleanRegisterPriceInputs();
    const gv = id => (g(id) ? g(id).value.trim() : '');
    const gn = id => (g(id) && g(id).value ? g(id).value : null);

    const publicAddress        = document.getElementById("publicAddress").value.trim();
    const mapAddress           = document.getElementById("mapAddress").value.trim();
    const privateDetailAddress = document.getElementById("privateDetailAddress").value.trim();

    const item = {
      id: 'HITOP-' + Date.now(),
      type, category1: cat1, category2: cat2,
      title,
      address:            mapAddress || publicAddress,
      publicAddress,
      mapAddress,
      privateDetailAddress,
      status:      gv('status') || '광고중',
      description: gv('description'),
      is_public:   g('is_public').checked,
      resource_id: gv('resource_id') || null,
      image_urls:  [],
      // 기본정보 추가
      dealType:       gv('dealType'),
      // 가격정보
      salePrice:      gv('salePrice'),
      presalePrice:   gv('presalePrice'),
      deposit:        gv('deposit'),
      monthlyRent:    gv('monthlyRent'),
      managementFee:  gv('managementFee'),
      premium:        gv('premium'),
      // 면적
      areaM2:             gn('areaM2'),
      areaPy:             gn('areaPy'),
      exclusiveAreaM2:    gn('exclusiveAreaM2'),
      exclusiveAreaPy:    gn('exclusiveAreaPy'),
      supplyAreaM2:       gn('supplyAreaM2'),
      supplyAreaPy:       gn('supplyAreaPy'),
      landAreaM2:         gn('landAreaM2'),
      landAreaPy:         gn('landAreaPy'),
      buildingAreaM2:     gn('buildingAreaM2'),
      buildingAreaPy:     gn('buildingAreaPy'),
      totalFloorAreaM2:   gn('totalFloorAreaM2'),
      totalFloorAreaPy:   gn('totalFloorAreaPy'),
      // 추가정보
      floorInfo:    gv('floorInfo'),
      zoning:       gv('zoning'),
      parkingCount: gv('parkingCount'),
      approvalDate: gv('approvalDate'),
      // 기타
      detailDescription: gv('detailDescription'),
      owner_contact:     gv('owner_contact'),
      stickers,
    };

    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = '저장 중...';

    try {
      if (_selectedImages.length) {
        const urls = await uploadListingImages(_selectedImages, item.id);
        item.image_urls = urls;
        item.imageUrls  = urls;
      }
      await addListing(item);
      showToast('✅ 저장완료!');
      setTimeout(() => location.href = 'index.html', 1000);
    } catch(e) {
      showToast('❌ 저장 실패: ' + e.message);
      btn.disabled = false; btn.textContent = '저장하기';
    }
  });

  // ── 초기화 ──────────────────────────────────────
  loadResourceSelect();
  renderCat2();
</script>
</body>
</html>
